<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>My Scorebook</title>
<meta name="theme-color" content="#1E3A5F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Scorebook">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.webmanifest">
<style>
  :root {
    --paper: #EAF0E6; --card: #F8FBF5; --ink: #1E3A5F; --ink-soft: #5A7089;
    --line: #C2D2BC; --red: #C0392B; --red-soft: #F6E3E0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--paper); color: var(--ink);
    font-family: Georgia, 'Times New Roman', serif;
    background-image: repeating-linear-gradient(to bottom, transparent 0, transparent 27px, rgba(194,210,188,.33) 27px, rgba(194,210,188,.33) 28px);
  }
  .wrap { max-width: 760px; margin: 0 auto; padding: 24px 14px 90px; }
  .disp { font-family: 'Arial Narrow', 'Helvetica Neue Condensed', Impact, sans-serif; text-transform: uppercase; letter-spacing: .1em; }
  .mono { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
  header { border-bottom: 3px double var(--ink); padding-bottom: 12px; margin-bottom: 16px; }
  header h1 { margin: 0; font-size: 32px; line-height: 1; letter-spacing: .06em; }
  #tally { font-size: 13px; color: var(--ink-soft); margin-top: 6px; font-style: italic; }
  .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 16px; }
  .chip { font-size: 12px; padding: 6px 12px; border-radius: 999px; border: 1.5px solid var(--ink); background: transparent; color: var(--ink); cursor: pointer; }
  .chip.active { background: var(--ink); color: var(--card); }
  input, select, textarea {
    padding: 8px 10px; border: 1px solid var(--line); border-radius: 4px; background: #fff;
    color: var(--ink); font-family: Georgia, serif; font-size: 16px; width: 100%;
  }
  select.inline { width: auto; font-size: 13px; padding: 6px 8px; }
  #search { flex: 1; min-width: 150px; font-size: 14px; }
  label { display: block; font-family: 'Arial Narrow', Impact, sans-serif; text-transform: uppercase; letter-spacing: .08em; font-size: 11px; color: var(--ink-soft); margin-bottom: 4px; }
  .addbtn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 12px; margin-bottom: 20px; border: 2px dashed var(--ink); border-radius: 6px; background: transparent; color: var(--ink); font-size: 14px; cursor: pointer; }
  .panel { background: var(--card); border: 1.5px solid var(--ink); border-radius: 6px; padding: 14px; margin-bottom: 22px; box-shadow: 3px 3px 0 var(--ink); }
  .panel-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .xbtn { background: none; border: none; color: var(--ink-soft); font-size: 20px; cursor: pointer; line-height: 1; padding: 2px 6px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .grid-teams { display: grid; grid-template-columns: 1fr 58px 1fr 58px; gap: 6px; margin-bottom: 12px; align-items: end; }
  .venue-row { margin-bottom: 12px; }
  .venue-btns { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .vbtn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 12px; border-radius: 4px; font-size: 13px; cursor: pointer; border: 1.5px solid var(--line); background: #fff; color: var(--ink); font-family: Georgia, serif; }
  .vbtn.active { border-color: var(--red); background: var(--red-soft); color: var(--red); }
  .boxlaunch { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 4px; cursor: pointer; border: 1.5px solid var(--red); background: #fff; color: var(--red); font-size: 13px; font-weight: 700; }
  .boxlaunch.has { background: var(--red-soft); }
  .saverow { display: flex; gap: 8px; margin-top: 12px; }
  .savebtn { flex: 1; padding: 10px; background: var(--ink); color: var(--card); border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
  .cancelbtn { padding: 10px 16px; background: transparent; color: var(--ink-soft); border: 1px solid var(--line); border-radius: 4px; font-size: 13px; cursor: pointer; font-family: Georgia, serif; }
  .card { position: relative; background: var(--card); border: 1px solid var(--line); border-left: 4px solid var(--ink); border-radius: 4px; padding: 13px 14px; margin-bottom: 13px; }
  .stamp { position: absolute; top: 10px; right: 12px; transform: rotate(-6deg); border: 2px solid var(--red); color: var(--red); border-radius: 3px; font-size: 10px; letter-spacing: .12em; padding: 2px 7px; opacity: .85; }
  .meta { font-size: 12px; color: var(--ink-soft); margin-bottom: 4px; }
  .matchup { font-size: 19px; font-weight: 700; letter-spacing: .04em; }
  .matchup .at { color: var(--ink-soft); font-weight: 400; font-size: 14px; margin: 0 6px; }
  .matchup .score { font-size: 17px; }
  .teamhead { font-size: 11px; font-weight: 700; border-bottom: 2px solid var(--ink); padding-bottom: 2px; margin: 8px 0 4px; }
  .boxwrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .sheet.wide { width: max-content; min-width: min(100%, 340px); max-width: none; }
  table.edit thead th { position: sticky; top: 0; background: var(--card); z-index: 2; }
  /* live: pitch-type chips + diamond */
  .pchips { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-bottom: 8px; }
  .pchip { padding: 5px 10px; font-size: 11px; border: 1px solid var(--line); border-radius: 999px; background: #fff; color: var(--ink-soft); cursor: pointer; font-family: ui-monospace, Menlo, monospace; }
  .pchip.on { border-color: var(--red); color: var(--red); background: var(--red-soft); font-weight: 700; }
  .diamond-wrap { margin: 2px 0 6px; } .diamond-wrap svg { width: 100%; height: auto; display: block; border-radius: 6px; }
  table.box { border-collapse: collapse; font-size: 12px; width: 100%; }
  table.box th { text-align: right; color: var(--ink-soft); font-weight: 600; padding: 2px 6px; font-size: 11px; }
  table.box th.pl { text-align: left; font-weight: 400; font-size: 10px; text-transform: uppercase; letter-spacing: .08em; padding-left: 0; }
  table.box td { text-align: right; padding: 2px 6px; white-space: nowrap; }
  table.box td.pl { text-align: left; font-weight: 600; padding-left: 0; }
  .mline { font-size: 11px; color: var(--red); padding: 0 0 4px 8px; text-align: left !important; }
  .notes { margin-top: 8px; font-size: 13px; font-style: italic; color: var(--ink-soft); }
  .cardbtns { display: flex; gap: 14px; margin-top: 9px; }
  .cardbtns button { background: none; border: none; font-size: 12px; cursor: pointer; padding: 0; font-family: Georgia, serif; }
  .ebtn { color: var(--ink-soft); } .dbtn { color: var(--red); }
  .empty { text-align: center; color: var(--ink-soft); padding: 40px 10px; font-style: italic; }
  /* box score overlay */
  #overlay { position: fixed; inset: 0; z-index: 50; background: rgba(30,58,95,.45); overflow: auto; padding: 12px 6px; }
  #overlay.hidden, .hidden { display: none; }
  .sheet { background: var(--card); border: 2px solid var(--ink); border-radius: 6px; box-shadow: 4px 4px 0 var(--ink); max-width: 880px; margin: 0 auto; padding: 14px; }
  .sheet-head { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 3px double var(--ink); padding-bottom: 10px; margin-bottom: 6px; }
  .hint { font-size: 11px; color: var(--ink-soft); font-style: italic; margin-bottom: 12px; }
  .grouplabel { font-size: 13px; font-weight: 700; color: var(--red); margin: 14px 0 6px; }
  table.edit { border-collapse: collapse; width: 100%; }
  table.edit th { font-size: 10px; color: var(--ink); text-align: center; padding: 4px 2px; border-bottom: 2px solid var(--ink); }
  table.edit th.pl { color: var(--ink-soft); text-align: left; min-width: 104px; font-family: 'Arial Narrow', Impact, sans-serif; text-transform: uppercase; letter-spacing: .08em; }
  table.edit td { padding: 5px 2px 2px; }
  table.edit input.stat { width: 44px; padding: 7px 1px; text-align: center; font-size: 14px; }
  table.edit input.pname { min-width: 104px; padding: 6px 8px; font-size: 13px; }
  .teamtog { font-size: 11px; padding: 6px 8px; cursor: pointer; border: 1px solid var(--line); border-radius: 3px; background: #fff; color: var(--ink); max-width: 84px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .mrow td { padding: 0 0 6px 4px; border-bottom: 1px dashed var(--line); font-size: 11px; }
  .addrow { background: none; border: none; color: var(--red); font-size: 13px; cursor: pointer; padding: 6px 0 0; font-family: Georgia, serif; }
  .delrow { background: none; border: none; color: var(--ink-soft); cursor: pointer; font-size: 15px; }
  .donebtn { width: 100%; padding: 11px; background: var(--ink); color: var(--card); border: none; border-radius: 4px; font-size: 14px; cursor: pointer; margin-top: 8px; }
  .err { background: var(--red-soft); border: 1px solid var(--red); border-radius: 4px; padding: 8px 12px; font-size: 13px; margin-bottom: 12px; color: var(--red); }
  /* live scorer */
  .lcount { font-size: 52px; font-weight: 700; text-align: center; letter-spacing: .05em; margin: 6px 0 2px; }
  .lcount-label { text-align: center; font-size: 11px; color: var(--ink-soft); letter-spacing: .15em; text-transform: uppercase; margin-bottom: 14px; }
  .lbatter { text-align: center; margin-bottom: 4px; }
  .lbatter button { background: none; border: none; cursor: pointer; color: var(--ink); font-size: 21px; font-weight: 700; font-family: 'Arial Narrow', Impact, sans-serif; text-transform: uppercase; letter-spacing: .05em; border-bottom: 2px dashed var(--line); padding: 2px 4px; }
  .lnext { text-align: center; font-size: 12px; color: var(--ink-soft); font-style: italic; margin-bottom: 10px; }
  .lgrid { display: grid; gap: 8px; margin-bottom: 8px; }
  .lg2 { grid-template-columns: 1fr 1fr; } .lg3 { grid-template-columns: 1fr 1fr 1fr; } .lg4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
  .lbtn { padding: 16px 4px; font-size: 16px; font-weight: 700; border: 1.5px solid var(--ink); border-radius: 6px; background: #fff; color: var(--ink); cursor: pointer; font-family: 'Arial Narrow', Impact, sans-serif; text-transform: uppercase; letter-spacing: .06em; }
  .lbtn.big { padding: 22px 4px; font-size: 19px; }
  .lbtn.redb { border-color: var(--red); color: var(--red); }
  .lbtn.soft { border-color: var(--line); color: var(--ink-soft); font-size: 13px; padding: 11px 4px; }
  .lbtn:disabled { opacity: .35; cursor: default; }
  .lbtn.full { grid-column: 1 / -1; }
  .llist { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .llist button { padding: 12px; font-size: 15px; border: 1.5px solid var(--line); border-radius: 6px; background: #fff; color: var(--ink); cursor: pointer; text-align: left; font-family: Georgia, serif; }
  .llist button.cur { border-color: var(--red); background: var(--red-soft); }
  .lsetup-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
  .lsetup-row .n { width: 22px; font-size: 13px; color: var(--ink-soft); text-align: right; }
  .lstat-strip { font-size: 11px; text-align: center; color: var(--red); margin-bottom: 12px; min-height: 14px; }
  .modebar { display: flex; gap: 0; margin: 12px 0 0; border: 1.5px solid var(--ink); border-radius: 999px; overflow: hidden; }
  .modebtn { flex: 1; padding: 8px 4px; border: none; background: transparent; color: var(--ink); font-size: 12px; cursor: pointer; }
  .modebtn.active { background: var(--red); color: #fff; }
  .nav { display: flex; gap: 8px; margin: 14px 0 16px; }
  .navbtn { flex: 1; padding: 8px 2px; border: 1.5px solid var(--ink); border-radius: 6px; background: transparent; color: var(--ink); font-size: 11px; cursor: pointer; }
  .recrow { font-size: 13px; padding: 4px 0; border-bottom: 1px dashed var(--line); }
  .recnum { color: var(--ink-soft); display: inline-block; width: 18px; }
  .navbtn.active { background: var(--ink); color: var(--card); }
  details.card summary::-webkit-details-marker { display: none; }
  .statk { cursor: pointer; border-bottom: 1px dotted currentColor; }
  #statTip { position: fixed; z-index: 100; max-width: 250px; background: var(--ink); color: var(--card); font-size: 12px; line-height: 1.45; padding: 8px 11px; border-radius: 6px; box-shadow: 0 4px 14px rgba(0,0,0,.35); font-family: Georgia, serif; pointer-events: none; }
  .backup { text-align: center; margin-top: 30px; font-size: 12px; color: var(--ink-soft); }
  .backup button { background: none; border: none; color: var(--ink); font-size: 12px; cursor: pointer; text-decoration: underline; font-family: Georgia, serif; padding: 4px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 class="disp">My Scorebook ⚾</h1>
    <div id="tally"></div>
  </header>
  <div class="modebar">
    <button class="modebtn disp active" data-mode="real">⚾ Real games</button>
    <button class="modebtn disp" data-mode="video">🎮 Video games</button>
  </div>
  <div id="err" class="err hidden">Couldn't save — your browser may be blocking storage (private browsing?). Changes will be lost when you close this page.</div>
  <div class="nav">
    <button class="navbtn disp active" data-view="games">📓 Games</button>
    <button class="navbtn disp" data-view="teams">👥 Teams</button>
    <button class="navbtn disp" data-view="stats">📊 Stats</button>
    <button class="navbtn disp" data-view="records">🏆 Records</button>
  </div>
  <div id="view-games">
  <div class="controls">
    <select id="venueFilter" class="inline">
      <option value="all">TV + in person + radio</option>
      <option value="tv">On TV only</option>
      <option value="in-person">In person only</option>
      <option value="radio">Radio only</option>
    </select>
    <input id="search" placeholder="Search players, teams, notes…">
  </div>
  <button id="addBtn" class="addbtn disp">＋ Log a game</button>
  <div id="formArea"></div>
  <div id="listArea"></div>
  <div class="backup">
    Your scorebook and teams live on this device.
    <button id="exportBtn">⬇ Back up to a file</button> ·
    <button id="importBtn">⬆ Restore from backup</button>
    <input type="file" id="importFile" accept=".json,application/json" hidden>
  </div>
  </div>
  <div id="view-teams" class="hidden"></div>
  <div id="view-stats" class="hidden"></div>
  <div id="view-records" class="hidden"></div>
</div>
<div id="overlay" class="hidden"></div>
<div id="statTip" class="hidden"></div>

<script>
"use strict";
// ── Schemas & math ────────────────────────────────────────────────────
const num = v => { const x = parseFloat(String(v ?? "").replace(/[^\d.\-]/g, "")); return isNaN(x) ? 0 : x; };
const filled = v => String(v ?? "").trim() !== "";
const f1 = x => x.toFixed(1), f2 = x => x.toFixed(2);
const b3 = x => { const s = x.toFixed(3); return s.startsWith("0") ? s.slice(1) : s; };
const pctStr = x => (x * 100).toFixed(1) + "%";
const ipVal = v => { const s = String(v ?? "").trim(); if (!s) return 0; const p = s.split("."); return (parseInt(p[0]) || 0) + Math.min(parseInt(p[1]) || 0, 2) / 3; };
const clampR = x => Math.max(0, Math.min(2.375, x));

const SPORTS = { basketball: "🏀", football: "🏈", baseball: "⚾" };
const BOX = {
  baseball: [
    { id: "batting", label: "Batting", add: "Add batter", cols: ["AB","R","H","2B","3B","HR","RBI","BB","HBP","SO","SB","RAB","RH","PIT","PH","PBB","PK"],
      calc: s => {
        const out=[], ab=num(s.AB), h=num(s.H), d=num(s["2B"]), t=num(s["3B"]), hr=num(s.HR), bb=num(s.BB), hbp=num(s.HBP);
        const tb = (h-d-t-hr) + 2*d + 3*t + 4*hr;
        if (h > 0) out.push(["TB", String(tb)]);
        let avg=null, obp=null, slg=null;
        if (ab > 0) { avg = h/ab; slg = tb/ab; }
        const oden = ab + bb + hbp;
        if (oden > 0) obp = (h+bb+hbp)/oden;
        if (avg !== null) out.push(["AVG", b3(avg)]);
        if (obp !== null) out.push(["OBP", b3(obp)]);
        if (slg !== null) out.push(["SLG", b3(slg)]);
        if (obp !== null && slg !== null) out.push(["OPS", b3(obp+slg)]);
        const rab = num(s.RAB);
        if (rab > 0) out.push(["RISP", b3(num(s.RH)/rab) + " (" + num(s.RH) + "-" + rab + ")"]);
        if (avg !== null && slg !== null && tb > h) out.push(["ISO", b3(slg - avg)]);
        const so = num(s.SO), bipDen = ab - so - hr;
        if (bipDen > 0 && filled(s.SO)) out.push(["BABIP", b3((h - hr) / bipDen)]);
        const pa = ab + bb + hbp;
        if (bb > 0 && pa > 0) out.push(["BB%", pctStr(bb / pa)]);
        if (so > 0 && pa > 0) out.push(["K%", pctStr(so / pa)]);
        const pit = num(s.PIT);
        if (pit > 0 && pa > 0) out.push(["P/PA", f1(pit / pa)]);
        if (num(s.PH) > 0 && h > 0) out.push(["P/H", f1(num(s.PH) / h)]);
        if (num(s.PBB) > 0 && bb > 0) out.push(["P/BB", f1(num(s.PBB) / bb)]);
        if (num(s.PK) > 0 && so > 0) out.push(["P/K", f1(num(s.PK) / so)]);
        return out;
      }},
    { id: "pitching", label: "Pitching", add: "Add pitcher", cols: ["IP","H","R","ER","BB","K","HR","PC","BAL","STR","SwS","LkS","FB","CB","SL","CH","OT"],
      calc: s => {
        const out=[], inn=ipVal(s.IP), bb=num(s.BB), k=num(s.K);
        if (inn > 0) out.push(["ERA", f2(9*num(s.ER)/inn)], ["WHIP", f2((bb+num(s.H))/inn)], ["K/9", f1(9*k/inn)]);
        if (bb > 0) out.push(["K/BB", f1(k/bb)]);
        if (inn > 0) {
          out.push(["H/9", f1(9*num(s.H)/inn)]);
          if (num(s.HR) > 0) out.push(["HR/9", f1(9*num(s.HR)/inn)]);
          out.push(["FIP", f2((13*num(s.HR) + 3*bb - 2*k)/inn + 3.1)]);
        }
        const sw=num(s.SwS), lk=num(s.LkS), pc=num(s.PC), strn=num(s.STR);
        if (pc > 0 && strn > 0) out.push(["Str%", pctStr(strn/pc)]);
        if (pc > 0 && (sw+lk) > 0) out.push(["SwStr%", pctStr(sw/pc)]);
        return out;
      }},
    { id: "fielding", label: "Fielding", add: "Add fielder", cols: ["PO","A","E"],
      calc: s => {
        const po=num(s.PO), a=num(s.A), e=num(s.E), den=po+a+e;
        return den > 0 ? [["FLD%", b3((po+a)/den)]] : [];
      }},
  ],
};

// ── State ─────────────────────────────────────────────────────────────
const STAT_GLOSSARY = {
  "MIN": "Minutes played", "FGM": "Field goals made", "FGA": "Field goals attempted", "3PM": "Three-pointers made", "3PA": "Three-point attempts",
  "FTM": "Free throws made", "FTA": "Free throws attempted", "OREB": "Offensive rebounds", "DREB": "Defensive rebounds", "REB": "Total rebounds",
  "AST": "Assists", "STL": "Steals", "BLK": "Blocks", "TO": "Turnovers", "PF": "Personal fouls", "PTS": "Points",
  "FG%": "Field goal percentage: shots made out of shots taken", "3P%": "Three-point percentage", "FT%": "Free throw percentage",
  "eFG%": "Effective FG%: like FG% but threes count 1.5x", "TS%": "True shooting %: overall scoring efficiency including threes and free throws",
  "GmSc": "Game Score: one number for the whole performance. ~10 is average, 30+ is huge", "2P%": "Two-point field goal percentage",
  "3PAr": "Three-point attempt rate: share of shots taken from deep", "AST/TO": "Assist-to-turnover ratio. Higher = better ball security",
  "EFF": "Efficiency: points + rebounds + assists + steals + blocks, minus missed shots and turnovers",
  "CMP": "Completions", "ATT": "Pass attempts", "YDS": "Yards", "TD": "Touchdowns", "INT": "Interceptions", "SACK": "Times sacked",
  "CMP%": "Completion percentage", "Y/A": "Yards per pass attempt", "AY/A": "Adjusted yards per attempt: TDs add 20, INTs subtract 45",
  "RTG": "NFL passer rating (0 to 158.3; ~95 is good)", "CAR": "Carries", "YPC": "Yards per carry", "LONG": "Longest play", "FUM": "Fumbles",
  "TGT": "Targets: passes thrown his way", "REC": "Receptions", "Y/R": "Yards per reception", "YPT": "Yards per target", "CATCH%": "Catch rate: receptions out of targets",
  "AB": "At-bats (walks and HBP do not count)", "R": "Runs scored", "H": "Hits", "2B": "Doubles", "3B": "Triples", "HR": "Home runs",
  "RBI": "Runs batted in", "BB": "Walks", "HBP": "Hit by pitch", "SO": "Strikeouts", "SB": "Stolen bases",
  "RAB": "At-bats with runners in scoring position (2nd or 3rd)", "RH": "Hits with runners in scoring position",
  "PIT": "Total pitches seen at the plate", "PH": "Pitches seen in at-bats that ended in a hit", "PBB": "Pitches seen during walks", "PK": "Pitches seen during strikeouts",
  "P/PA": "Average pitches seen per plate appearance. 4.0+ is a grinder who works the count", "P/H": "Average pitches in at-bats where he got a hit",
  "P/BB": "Average pitches per walk", "P/K": "Average pitches per strikeout",
  "TB": "Total bases: singles 1, doubles 2, triples 3, homers 4", "AVG": "Batting average: hits per at-bat",
  "OBP": "On-base percentage: how often he reaches base", "SLG": "Slugging: total bases per at-bat", "OPS": "OBP + SLG. .800+ is a good hitter",
  "RISP": "Average with runners in scoring position: clutch hitting", "ISO": "Isolated power (SLG minus AVG): extra bases only",
  "BABIP": "Batting average on balls in play. ~.300 is normal; far off suggests luck", "BB%": "Walk rate per plate appearance", "K%": "Strikeout rate per plate appearance",

const KEY = "sports-stat-log-v1";
let entries = [];
try { entries = JSON.parse(localStorage.getItem(KEY) || "[]"); } catch (e) {}
const TKEY = "sports-stat-teams-v1";
let teamsDB = [];
try { teamsDB = JSON.parse(localStorage.getItem(TKEY) || "[]"); } catch (e) {}

// ── App mode: real games vs video games ───────────────────────────────
let appMode = "real";
try { appMode = localStorage.getItem("sports-stat-mode") === "video" ? "video" : "real"; } catch (e) {}
let currentView = "games";

const VENUES = {
  real: [
    { v: "tv", label: "📺 On TV", meta: " · on TV", words: "tv on tv television watched", placeLbl: "Where you watched (optional)", placePh: "Home, sports bar…" },

    { v: "stream", label: "📺 Watched", meta: " · watched (stream)", words: "stream watched twitch youtube replay", placeLbl: "Game / where you watched (optional)", placePh: "MLB The Show · Twitch" },

  ],
};
function venueDef(e) {
  const all = VENUES.real.concat(VENUES.video);
  return all.find(x => x.v === e.venue) || VENUES.real[0];
}
function modeOf(x) { return (x && x.mode) === "video" ? "video" : "real"; }
function modeTeams() { return teamsDB.filter(t => modeOf(t) === appMode); }
function venueFilterOptionsHtml() {
  const vs = VENUES[appMode];
  return '<option value="all">' + (appMode === "video" ? "Played + watched + online" : "TV + in person + radio") + "</option>"
    + vs.map(d => '<option value="' + d.v + '">' + d.label.replace(/^[^ ]+ /, "") + " only</option>").join("");
}
function setMode(m) {
  appMode = m;

// Ask the browser to mark this data as persistent so the OS won't evict it to free space
try { if (navigator.storage && navigator.storage.persist) navigator.storage.persist(); } catch (e) {}
let form = null, editingId = null, rowSeq = 0;

const esc = s => String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const today = () => new Date().toISOString().slice(0, 10);
const emptyForm = () => ({ sport: "baseball", date: today(), away: "", home: "", awayScore: "", homeScore: "", venue: appMode === "video" ? "played" : "tv", place: "", box: [], pbp: [], notes: "", mode: appMode });
const newRow = g => ({ id: "r" + Date.now().toString(36) + (rowSeq++), player: "", team: "away", group: g, stats: {} });
const mline = m => m.map(([k, v]) => k + " " + v).join("  ·  ");
const mlineHtml = m => m.map(([k, v]) => '<span class="statk" data-stat="' + esc(k) + '">' + esc(k) + "</span> " + esc(v)).join(" · ");

function persist() {
  try { localStorage.setItem(KEY, JSON.stringify(entries)); document.getElementById("err").classList.add("hidden"); }
  catch (e) { document.getElementById("err").classList.remove("hidden"); }

// ── Tally & list ──────────────────────────────────────────────────────
function renderTally() {
  const list = entries.filter(e => modeOf(e) === appMode);
  const key = appMode === "video" ? "played" : "in-person";
  const m = list.filter(e => e.venue === key).length;
  document.getElementById("tally").textContent = list.length === 0
    ? (appMode === "video" ? "Every video game, on the record." : "Every game you've watched, on the record.")
    : list.length + " game" + (list.length === 1 ? "" : "s") + " logged · " + m + (appMode === "video" ? " played yourself" : " seen in person");
}

function boxDisplayHTML(e) {
  const groups = BOX[e.sport] || [], rows = e.box || [];
  if (!rows.length) return "";
  let html = "";
  for (const t of ["away", "home"]) {
    const tr = rows.filter(r => r.team === t);
    if (!tr.length) continue;
    html += '<div class="teamhead disp">' + esc(t === "away" ? e.away || "Away" : e.home || "Home") + "</div>";
    for (const g of groups) {
      const gr = tr.filter(r => r.group === g.id);
      if (!gr.length) continue;
      const used = g.cols.filter(c => gr.some(r => filled(r.stats[c])));
      const cols = used.length ? used : g.cols;
      html += '<div class="boxwrap"><table class="box mono"><tr><th class="pl">' + (groups.length > 1 ? esc(g.label) : "") + "</th>"
        + cols.map(c => '<th class="statk" data-stat="' + esc(c) + '">' + esc(c) + "</th>").join("") + "</tr>";
      for (const r of gr) {
        html += '<tr><td class="pl">' + esc(r.player || "—") + "</td>" + cols.map(c => "<td>" + esc(r.stats[c] || "·") + "</td>").join("") + "</tr>";
        const m = g.calc(r.stats);
        if (m.length) html += '<tr><td class="mline" colspan="' + (cols.length + 1) + '">' + mlineHtml(m) + "</td></tr>";
      }
      html += "</table></div>";
    }
  }
  return '<div style="margin-top:8px">' + html + "</div>";
}

function lineScoreTable(line, away, home, minInn) {
  if (!line) return "";
  const n = Math.max(minInn || 0, line.a.length, line.h.length);
  if (!n) return "";
  const tot = arr => arr.reduce((x, y) => x + (y || 0), 0);
  const cell = v => '<td style="padding:1px 5px;text-align:center">' + v + "</td>";
  const row = (name, arr, hits, errs) =>
    "<tr><td style=\"text-align:left;padding:1px 6px 1px 0;font-weight:600;white-space:nowrap\">" + esc(String(name).slice(0, 14)) + "</td>"
    + Array.from({ length: n }, (_, i) => cell(arr[i] != null ? arr[i] : "·")).join("")
    + "<td style=\"padding:1px 5px;text-align:center;font-weight:700;border-left:1px solid var(--line)\">" + tot(arr) + "</td>"
    + cell(hits) + cell(errs) + "</tr>";
  return '<div class="boxwrap"><table class="mono" style="font-size:11px;border-collapse:collapse;margin:4px auto 6px">'
    + "<tr><td></td>" + Array.from({ length: n }, (_, i) => '<td style="padding:1px 5px;text-align:center;color:var(--ink-soft)">' + (i + 1) + "</td>").join("")
    + "<td style=\"padding:1px 5px;font-weight:700;border-left:1px solid var(--line)\">R</td><td style=\"padding:1px 5px;font-weight:700\">H</td><td style=\"padding:1px 5px;font-weight:700\">E</td></tr>"
    + row(away || "Away", line.a, line.hits.away, line.errs.away)
    + row(home || "Home", line.h, line.hits.home, line.errs.home)
    + "</table></div>";
}
function pbpGroupHtml(pbp) {
  let h = "", lastKey = "";
  for (const p of pbp) {
    const key = p.h + "-" + p.i;
    if (key !== lastKey) { h += '<div class="disp" style="font-size:11px;font-weight:700;color:var(--red);margin:8px 0 3px">' + (p.h === "top" ? "▲ Top " : "▼ Bottom ") + p.i + "</div>"; lastKey = key; }
    h += '<div style="font-size:13px;padding:2px 0;border-bottom:1px dashed var(--line)">' + esc(p.t) + "</div>";
  }
  return h;
}
function renderList() {
  const venueFilter = document.getElementById("venueFilter").value;
  const q = document.getElementById("search").value.trim().toLowerCase();
  const list = entries.filter(e => {
    if (modeOf(e) !== appMode) return false;
    if (venueFilter !== "all" && e.venue !== venueFilter) return false;
    if (q) {
      const legacy = (e.statLines || []).map(s => s.player + " " + s.line);
      const names = (e.box || []).map(r => r.player);
      const venueWords = venueDef(e).words || "";
      if (![e.away, e.home, e.place, e.notes, venueWords, ...legacy, ...names].join(" ").toLowerCase().includes(q)) return false;
    }
    return true;
  });
  const area = document.getElementById("listArea");
  if (!list.length) {
    area.innerHTML = '<div class="empty">' + (entries.length === 0 ? "No games yet. Log the first one above." : "No games match those filters.") + "</div>";
    return;
  }
  area.innerHTML = list.map(e => {
    const hasScore = filled(e.awayScore) || filled(e.homeScore);
    const legacy = (e.statLines || []).length
      ? '<div style="margin-top:8px;border-top:1px dashed var(--line);padding-top:8px">' + e.statLines.map(s =>
          '<div class="mono" style="font-size:13px;display:flex;gap:12px;padding:2px 0"><span style="min-width:120px;font-weight:600">' + esc(s.player) + "</span><span>" + esc(s.line) + "</span></div>").join("") + "</div>"
      : "";
    return '<div class="card" data-id="' + e.id + '">'
      + (venueDef(e).stamp ? '<div class="stamp disp">' + venueDef(e).stamp + "</div>" : "")
      + '<div class="meta mono">' + (SPORTS[e.sport] || "") + " " + esc(e.date) + (e.place ? " · " + esc(e.place) : esc(venueDef(e).meta || "")) + "</div>"
      + '<div class="matchup disp">' + esc(e.away || "?") + " " + (hasScore ? '<span class="score mono">' + esc(e.awayScore || "–") + "</span>" : "")
      + '<span class="at">@</span>' + esc(e.home || "?") + " " + (hasScore ? '<span class="score mono">' + esc(e.homeScore || "–") + "</span>" : "") + "</div>"
      + (e.sport === "baseball" && e.live && e.live.line ? lineScoreTable(e.live.line, e.away, e.home, 0) : "")
      + boxDisplayHTML(e)
      + ((e.pbp && e.pbp.length) ? '<details style="margin-top:8px"><summary class="disp" style="cursor:pointer;font-size:12px;color:var(--ink)">📜 Game log · ' + e.pbp.length + ' plays</summary><div style="margin-top:4px">' + pbpGroupHtml(e.pbp) + "</div></details>" : "")
      + legacy
      + (e.notes ? '<div class="notes">“' + esc(e.notes) + "”</div>" : "")
      + '<div class="cardbtns"><button class="ebtn" data-act="edit">✎ Edit</button>'
      + (e.sport === "baseball" ? '<button class="ebtn" data-act="share">📤 Share</button>' : "")
      + '<button class="dbtn" data-act="del">🗑 Delete</button></div></div>';
  }).join("");
}

// ── Game form ─────────────────────────────────────────────────────────
function openForm(entry) {
  form = entry ? JSON.parse(JSON.stringify({ ...emptyForm(), ...entry })) : emptyForm();
  form.box = form.box || [];
  form.pbp = form.pbp || [];
  editingId = entry ? entry.id : null;
  const a = document.getElementById("formArea");
  a.innerHTML = '<div class="panel">'
    + '<div class="panel-head"><span class="disp" style="font-size:15px;font-weight:700">' + (editingId ? "Edit game" : "New game") + '</span><button class="xbtn" id="fClose">✕</button></div>'
    + '<div style="margin-bottom:12px"><label>Date</label><input type="date" id="fDate" value="' + esc(form.date) + '"></div>'
    + '<div class="grid-teams"><div><label>Away</label><input id="fAway" placeholder="Cubs" value="' + esc(form.away) + '"></div>'
    + '<div><label>Pts</label><input id="fAwayScore" class="mono" style="text-align:center" value="' + esc(form.awayScore) + '"></div>'
    + '<div><label>Home</label><input id="fHome" placeholder="Dodgers" value="' + esc(form.home) + '"></div>'
    + '<div><label>Pts</label><input id="fHomeScore" class="mono" style="text-align:center" value="' + esc(form.homeScore) + '"></div></div>'
    + '<div class="venue-row"><label>Watched / listened</label><div class="venue-btns">'
        + VENUES[modeOf(form)].map(d => '<button class="vbtn" data-v="' + d.v + '">' + d.label + "</button>").join("") + "</div>"
    + '<label id="placeLabel"></label><input id="fPlace" value="' + esc(form.place) + '"></div>'
    + '<button class="boxlaunch disp" id="fBox"></button>'
    + '<button class="boxlaunch disp" id="fLive"></button>'
    + '<label>Notes</label><textarea id="fNotes" rows="2" placeholder="Buzzer beater in OT, sat behind the dugout…">' + esc(form.notes) + "</textarea>"
    + '<div class="saverow"><button class="savebtn disp" id="fSave">' + (editingId ? "Save changes" : "Add to scorebook") + '</button><button class="cancelbtn" id="fCancel">Cancel</button></div></div>';
  document.getElementById("addBtn").classList.add("hidden");

  const bind = (id, key) => document.getElementById(id).addEventListener("input", ev => form[key] = ev.target.value);
  bind("fDate", "date"); bind("fAway", "away"); bind("fAwayScore", "awayScore");
  bind("fHome", "home"); bind("fHomeScore", "homeScore"); bind("fPlace", "place"); bind("fNotes", "notes");
  a.querySelectorAll(".vbtn").forEach(b => b.addEventListener("click", () => { form.venue = b.dataset.v; updateVenue(); }));
  document.getElementById("fBox").addEventListener("click", openBox);
  document.getElementById("fLive").addEventListener("click", openLive);
  document.getElementById("fClose").addEventListener("click", closeForm);
  document.getElementById("fCancel").addEventListener("click", closeForm);
  document.getElementById("fSave").addEventListener("click", saveEntry);
  updateVenue(); updateBoxBtn();
}

function updateVenue() {
  const defs = VENUES[modeOf(form)];
  document.querySelectorAll("#formArea .vbtn[data-v]").forEach(b => b.classList.toggle("active", b.dataset.v === form.venue));
  const d = defs.find(x => x.v === form.venue) || defs[0];
  document.getElementById("placeLabel").textContent = d.placeLbl;
  document.getElementById("fPlace").placeholder = d.placePh;
}
function updateBoxBtn() {
  const n = form.box.filter(r => r.player.trim()).length;
  const b = document.getElementById("fBox");
  b.textContent = n > 0 ? "📋 Box score · " + n + " player" + (n === 1 ? "" : "s") + " — tap to edit" : "📋 Log stats — open box score";
  b.classList.toggle("has", n > 0);
  const lv = document.getElementById("fLive");
  lv.classList.toggle("hidden", form.sport !== "baseball");
  lv.textContent = form.live ? "⚾ Resume live scoring" : "⚾ Live scoring — pitch by pitch";
  lv.classList.toggle("has", !!form.live);
}
function closeForm() {
  document.getElementById("formArea").innerHTML = "";
  document.getElementById("addBtn").classList.remove("hidden");
  form = null; editingId = null;
}
function saveEntry() {
  if (!form.away.trim() && !form.home.trim()) { document.getElementById("fAway").focus(); return; }
  const cleaned = { ...form, box: form.box.filter(r => r.player.trim() || Object.values(r.stats).some(v => String(v).trim())) };
  if (!cleaned.mode) cleaned.mode = "real";
  if (cleaned.live && cleaned.live.line && (cleaned.live.line.a.length || cleaned.live.line.h.length)) {
    const la = cleaned.live.line.a.reduce((x, y) => x + (y || 0), 0);
    const lh = cleaned.live.line.h.reduce((x, y) => x + (y || 0), 0);
    if (!filled(cleaned.awayScore)) cleaned.awayScore = String(la);
    if (!filled(cleaned.homeScore)) cleaned.homeScore = String(lh);
  }
  if (editingId) {
    entries = entries.map(e => e.id === editingId ? { ...cleaned, id: editingId } : e);
  } else {
    entries.unshift({ ...cleaned, id: Date.now().toString(36) });
  }
  entries.sort((a, b) => a.date < b.date ? 1 : -1);
  persist(); closeForm(); renderTally(); renderList();
}

// ── Box score editor ──────────────────────────────────────────────────
function openBox() {
  const ov = document.getElementById("overlay");
  ov.classList.remove("hidden");
  renderBoxEditor();
  document.body.style.overflow = "hidden";
}
function closeBox() {
  document.getElementById("overlay").classList.add("hidden");
  document.body.style.overflow = "";
  updateBoxBtn();
}
function teamName(t) { return t === "away" ? form.away || "Away" : form.home || "Home"; }

function renderBoxEditor() {
  const groups = BOX[form.sport] || [];
  let html = '<div class="sheet wide"><div class="sheet-head"><div>'
    + '<div class="disp" style="font-size:20px;font-weight:700">Official Box Score</div>'
    + '<div class="mono" style="font-size:12px;color:var(--ink-soft)">' + esc(form.away || "Away") + " @ " + esc(form.home || "Home") + " · " + esc(form.date) + "</div>"
    + '</div><button class="xbtn" id="bClose">✕</button></div>'

  for (const g of groups) {
    const rows = form.box.filter(r => r.group === g.id);
    html += '<div class="grouplabel disp">' + esc(g.label) + '</div><table class="edit"><thead>'
      + '<tr><th class="pl">Player</th><th class="pl">Team</th>' + g.cols.map(c => '<th class="mono statk" data-stat="' + esc(c) + '">' + esc(c) + "</th>").join("") + '<th></th></tr></thead><tbody>';
    if (!rows.length) html += '<tr><td colspan="' + (g.cols.length + 3) + '" style="font-size:12px;font-style:italic;color:var(--ink-soft);padding:10px 4px">No ' + g.label.toLowerCase() + " entries yet.</td></tr>";
    for (const r of rows) {
      const m = g.calc(r.stats);
      html += '<tr><td><input class="pname" data-row="' + r.id + '" data-f="player" value="' + esc(r.player) + '" placeholder="Name"></td>'
        + '<td><button class="teamtog mono" data-row="' + r.id + '" data-f="team" title="Tap to switch team">' + esc(teamName(r.team)) + "</button></td>"
        + g.cols.map(c => '<td><input class="stat mono" inputmode="decimal" data-row="' + r.id + '" data-col="' + esc(c) + '" value="' + esc(r.stats[c] || "") + '"></td>').join("")
        + '<td><button class="delrow" data-row="' + r.id + '" data-f="del">🗑</button></td></tr>'
        + '<tr class="mrow"><td colspan="' + (g.cols.length + 3) + '"><span class="mono" id="m-' + r.id + '" style="color:' + (m.length ? "var(--red)" : "var(--line)") + '">'
        + (m.length ? "→ " + mlineHtml(m) : "→ metrics will calculate here") + "</span></td></tr>";
    }
    html += '</tbody></table><button class="addrow" style="display:block" data-group="' + g.id + '">+ ' + esc(g.add) + "</button>";
  }
  html += '<button class="donebtn disp" id="bDone">Done — back to game</button></div>';
  const ov = document.getElementById("overlay");
  ov.innerHTML = html;

  ov.querySelector("#bClose").addEventListener("click", closeBox);
  ov.querySelector("#bDone").addEventListener("click", closeBox);
  ov.addEventListener("click", ev => { if (ev.target === ov) closeBox(); });
  ov.querySelectorAll(".addrow").forEach(b => b.addEventListener("click", () => { form.box.push(newRow(b.dataset.group)); renderBoxEditor(); }));
  ov.querySelectorAll(".delrow").forEach(b => b.addEventListener("click", () => { form.box = form.box.filter(r => r.id !== b.dataset.row); renderBoxEditor(); }));
  ov.querySelectorAll(".teamtog").forEach(b => b.addEventListener("click", () => {
    const r = form.box.find(r => r.id === b.dataset.row);
    r.team = r.team === "away" ? "home" : "away";
    b.textContent = teamName(r.team);
  }));
  ov.querySelectorAll("input.pname").forEach(i => i.addEventListener("input", () => {
    const r = form.box.find(r => r.id === i.dataset.row);
    r.player = i.value;
  }));
  ov.querySelectorAll("input.stat").forEach(i => i.addEventListener("input", () => {
    const r = form.box.find(r => r.id === i.dataset.row);
    r.stats[i.dataset.col] = i.value;
    const g = BOX[form.sport].find(g => g.id === r.group);
    const m = g.calc(r.stats);
    const span = document.getElementById("m-" + r.id);
    span.innerHTML = m.length ? "→ " + mlineHtml(m) : "→ metrics will calculate here";
    span.style.color = m.length ? "var(--red)" : "var(--line)";
  }));
}

// ── Live baseball scoring (diamond + baserunners + tracking options) ──
let liveSetup = null;
let liveView = { s: "main" };

const teamLabel = t => t === "away" ? (form.away || "Away") : (form.home || "Home");
const battingTeam = () => form.live.half === "top" ? "away" : "home";
const fieldingTeam = () => form.live.half === "top" ? "home" : "away";
const halfLabel = () => (form.live.half === "top" ? "▲ Top " : "▼ Bot ") + form.live.inning;
const teamRuns = t => form.box.filter(r => r.group === "batting" && r.team === t).reduce((a, r) => a + num(r.stats.R), 0);
const BASE_LBL = { first: "1st", second: "2nd", third: "3rd" };
const lastName = n => String(n || "").trim().split(/\s+/).slice(-1)[0];

const ipOutsOf = v => { const s = String(v ?? "").trim(); if (!s) return 0; const p = s.split("."); return (parseInt(p[0]) || 0) * 3 + Math.min(parseInt(p[1]) || 0, 2); };
const outsToIp = o => o <= 0 ? "" : Math.floor(o / 3) + "." + (o % 3);

function openLive() {
  if (form.live && !form.live.teams && !form.live.solo) form.live = null; // discard very old sessions
  if (form.live && form.live.teams && !form.live.bases) {                            // migrate sessions from before baserunners
    form.live.bases = { first: null, second: null, third: null };
    form.live.opts = form.live.opts || { strikeType: false, pitchType: false, fielding: false };

function doAction(o) {

// forced advancement for walks / HBP: returns {bases, scored}
function forcedBases(batter) {
  const b = form.live.bases;
  const had1 = b.first, had2 = b.second, had3 = b.third;
  const nb = { first: batter, second: b.second, third: b.third };
  const scored = [];
  if (had1) {
    if (had2) {
      if (had3) scored.push(had3);
      nb.third = had2;
    } else nb.third = had3;
    nb.second = had1;
  }
  return { bases: nb, scored };
}

function liveCount(kind) {

      const f = forcedBases(b.player);
      const np = L.abPit + 1;
      const bats = [{ ...b, cols: [["BB", 1], ["PIT", np], ["PBB", np]].concat(f.scored.length ? [["RBI", f.scored.length]] : []) }];
      for (const r of f.scored) bats.push({ player: r, team: b.team, cols: [["R", 1]] });
      const pit = pitchCols(null, true).concat([["BB", 1]]);

      doAction({ bats, pitCols: pit, advance: true, setBases: f.bases, flash: "Walk — " + b.player + (f.scored.length ? " · " + f.scored.join(", ") + " scores" : ""),

// ── Solo player tracking ──────────────────────────────────────────────
function soloSnap() { const L = form.live; return { b: L.balls, s: L.strikes, ap: L.abPit, r: !!L.risp }; }
function soloRestore(s) { const L = form.live; L.balls = s.b; L.strikes = s.s; L.abPit = s.ap; L.risp = s.r; }
function soloPname() {
  const S = form.live.solo;
  if (S.type === "pitcher") return { p: S.player, t: S.team };
  return (S.oppPitcher && S.oppPitcher.trim()) ? { p: S.oppPitcher.trim(), t: S.team === "away" ? "home" : "away" } : null;
}
function soloPitch(e, strikeKind, isBall, extraCols, outs) {
  const tgt = soloPname();
  if (!tgt || !tgt.p) return;
  const L = form.live;
  const cols = [["PC", 1], [isBall ? "BAL" : "STR", 1]];
  if (L.opts.pitchType) cols.push([L.pitchSel || "FB", 1]);
  if (L.opts.strikeType && strikeKind === "sw") cols.push(["SwS", 1]);
  if (L.opts.strikeType && strikeKind === "lk") cols.push(["LkS", 1]);
  const all = cols.concat(extraCols || []);
  applyPit(tgt.p, tgt.t, all, outs || 0);
  e.pit = { player: tgt.p, team: tgt.t, cols: all, outs: outs || 0 };
}
function soloBatCols(e, cols) {
  const S = form.live.solo;
  if (S.type !== "batter") return;
  applyColsG(S.player, S.team, "batting", cols);
  e.bats.push({ player: S.player, team: S.team, cols });
}
function soloEndAB(flash) {
  const L = form.live;
  L.balls = 0; L.strikes = 0; L.abPit = 0; L.risp = false;
  liveView = { s: "main", flash };
  renderLive();
}
function soloCount(kind) {
  const L = form.live, S = L.solo;
  const sk = kind === "strike-sw" ? "sw" : kind === "strike-lk" ? "lk" : null;
  const isStrike = kind === "strike" || sk;
  const e = { snap: soloSnap(), bats: [], pit: null };
  L.log.push(e);
  if (kind === "ball") {
    if (L.balls === 3) {
      const np = L.abPit + 1;
      soloBatCols(e, [["BB", 1], ["PIT", np], ["PBB", np]]);
      soloPitch(e, null, true, [["BB", 1]], 0);
      soloEndAB((S.type === "batter" ? S.player : "Batter") + " walks");
      return;
    }
    soloPitch(e, null, true); L.balls++; L.abPit++;
  } else if (isStrike) {
    if (L.strikes === 2) {
      const np = L.abPit + 1;
      const bc = [["SO", 1], ["AB", 1], ["PIT", np], ["PK", np]];
      if (L.risp) bc.push(["RAB", 1]);
      soloBatCols(e, bc);
      soloPitch(e, sk, false, [["K", 1]], 1);
      soloEndAB("Strikeout" + (sk === "lk" ? " looking" : sk === "sw" ? " swinging" : ""));
      return;
    }
    soloPitch(e, sk, false); L.strikes++; L.abPit++;
  } else { // foul
    soloPitch(e, null, false); L.abPit++;
    if (L.strikes < 2) L.strikes++;
  }
  liveView = { s: "main" };
  renderLive();
}
function soloOutcome(kind) {
  const L = form.live, np = L.abPit + 1;
  const e = { snap: soloSnap(), bats: [], pit: null };
  L.log.push(e);
  const defs = {
    "1b": { b: [["H", 1], ["AB", 1]], p: [["H", 1]], h: true, f: "Single" },
    "2b": { b: [["H", 1], ["2B", 1], ["AB", 1]], p: [["H", 1]], h: true, f: "Double" },
    "3b": { b: [["H", 1], ["3B", 1], ["AB", 1]], p: [["H", 1]], h: true, f: "Triple" },
    "hr": { b: [["H", 1], ["HR", 1], ["AB", 1], ["R", 1], ["RBI", 1]], p: [["H", 1], ["HR", 1], ["R", 1], ["ER", 1]], h: true, f: "Home run!" },
    "out": { b: [["AB", 1]], p: [], o: 1, f: "Out" },
    "hbp": { b: [["HBP", 1]], p: [], ball: true, f: "Hit by pitch" },
  };
  const d = defs[kind];
  const bc = d.b.concat([["PIT", np]]);
  if (d.h) bc.push(["PH", np]);
  if (L.risp && kind !== "hbp") { bc.push(["RAB", 1]); if (d.h) bc.push(["RH", 1]); }
  soloBatCols(e, bc);
  soloPitch(e, null, !!d.ball, d.p, d.o || 0);
  soloEndAB(d.f);
}
function soloExtra(kind) {
  const L = form.live;
  const e = { snap: soloSnap(), bats: [], pit: null };
  L.log.push(e);
  if (kind === "sb") { soloBatCols(e, [["SB", 1]]); liveView = { s: "main", flash: "Stolen base" }; }
  else if (kind === "r") { soloBatCols(e, [["R", 1]]); liveView = { s: "main", flash: "Run scored" }; }
  else if (kind === "rbi") { soloBatCols(e, [["RBI", 1]]); liveView = { s: "main", flash: "+1 RBI" }; }
  else if (kind === "rer" || kind === "run") {
    const t = soloPname();
    if (t && t.p) {
      const cols = kind === "rer" ? [["R", 1], ["ER", 1]] : [["R", 1]];
      applyPit(t.p, t.t, cols, 0);
      e.pit = { player: t.p, team: t.t, cols, outs: 0 };
    }
    liveView = { s: "main", flash: kind === "rer" ? "Earned run allowed" : "Unearned run allowed" };
  }
  renderLive();
}
function soloUndo() {
  const e = form.live.log.pop();
  if (!e) return;
  for (const b of e.bats) revertColsG(b.player, b.team, "batting", b.cols);
  if (e.pit) revertPit(e.pit.player, e.pit.team, e.pit.cols, e.pit.outs);
  soloRestore(e.snap);
  liveView = { s: "main" };
  renderLive();
}

      flash: "Walk", pbp: "Walk." });

  if ((kind === "strike" || sk) && L.strikes === 2) {
    const lbl = "Strikeout" + (sk === "lk" ? " looking" : sk === "sw" ? " swinging" : "");
    doAction({ bats: [], pitCols: pitchCols(sk, false).concat([["K", 1]]), pitOuts: 1, outs: 1, advance: true,

function renderLive() {

  if (form.live.oneTeam && battingTeam() !== form.live.oneTeam.side && (!liveView.s || liveView.s === "main")) { renderDef(); return; }
  const L = form.live;
  const bt = battingTeam(), ft = fieldingTeam();

  const pRow = pitcher ? form.box.find(x => x.group === "pitching" && x.team === ft && x.player.trim().toLowerCase() === pitcher.trim().toLowerCase()) : null;

  const bRow = form.box.find(x => x.group === "batting" && x.team === bt && x.player.trim().toLowerCase() === cur.trim().toLowerCase());
  const bLine = bRow ? ["AB", "R", "H", "2B", "3B", "HR", "RBI", "BB", "SO", "SB"].filter(c => filled(bRow.stats[c])).map(c => c + " " + bRow.stats[c]).join(" · ") : "";
  const occupied = runnersOnBase();

  let mid = "";
  if (liveView.s === "adv") {
    const pend = liveView.pend, r = pend.runners[pend.idx];
    mid = '<div class="hint" style="text-align:center">' + esc(pend.label) + " by " + esc(pend.batter.player) + ".<br>Where did <b>" + esc(r.name) + "</b> (on " + BASE_LBL[r.from] + ") end up?</div><div class=\"llist\">"
      + advOptions(pend).map(([v, lbl]) => '<button data-adv="' + v + '">' + lbl + "</button>").join("")
      + "</div>";
  } else if (liveView.s === "fld") {
    const players = fldPlayers(liveView.team);
    mid = '<div class="hint" style="text-align:center">' + ({ PO: "Putout recorded by…", A: "Assist by…", E: "Error charged to…" }[liveView.stat]) + " (" + esc(teamLabel(liveView.team)) + ')</div><div class="llist">'
      + players.map(p => '<button data-fld="' + esc(p) + '">' + esc(p) + "</button>").join("")
      + '</div><div class="lgrid"><button class="lbtn soft full" data-fldskip="1">' + (liveView.stat === "A" ? "No assist (unassisted)" : "Skip") + "</button></div>";
  } else if (liveView.s === "runner") {
    const name = L.bases[liveView.base];
    mid = '<div class="hint" style="text-align:center"><b>' + esc(name) + "</b> on " + BASE_LBL[liveView.base] + '</div><div class="llist">'
      + '<button data-ract="sb">Stole a base</button>'
      + '<button data-ract="adv">Advanced (WP, PB, balk…)' + (liveView.base === "third" ? " → scores" : "") + "</button>"
      + '<button data-ract="cs">Caught stealing</button>'
      + '<button data-ract="po">Picked off</button>'
      + '<button data-ract="outb">Out on the bases</button>'
      + '</div><div class="lgrid"><button class="lbtn soft full" data-lv="main">Cancel</button></div>';
  } else if (liveView.s === "bp") {
    mid = '<div class="hint" style="text-align:center">' + (occupied.length ? "Pick a runner (or tap a red base on the field)" : "No runners on base") + '</div><div class="llist">'
      + occupied.map(r => '<button data-pickbase="' + r.from + '">' + esc(r.name) + " — on " + BASE_LBL[r.from] + "</button>").join("")
      + (L.opts.fielding && (!L.oneTeam || fieldingTeam() === L.oneTeam.side) ? '<button data-lv="fldmenu">Fielding credit / error</button>' : "")
      + '</div><div class="lgrid"><button class="lbtn soft full" data-lv="main">Cancel</button></div>';
  } else if (liveView.s === "fldmenu") {
    mid = '<div class="hint" style="text-align:center">Credit what?</div><div class="llist">'
      + '<button data-fldstat="PO">Putout</button><button data-fldstat="A">Assist</button><button data-fldstat="E">Error</button>'
      + '</div><div class="lgrid"><button class="lbtn soft full" data-lv="main">Cancel</button></div>';
  } else if (liveView.s === "log") {
    mid = '<div id="pbpScroll" style="max-height:280px;overflow-y:auto;text-align:left;border:1px solid var(--line);border-radius:4px;padding:4px 10px;background:#fff">'
      + (form.pbp.length ? pbpGroupHtml(form.pbp) : '<div class="hint" style="padding:8px 0">No plays yet — the story writes itself as you score.</div>')
      + '</div><div class="lgrid" style="margin-top:10px"><button class="lbtn soft full" data-lv="main">Back to scoring</button></div>';
  } else if (liveView.s === "sub") {
    const subTm = teamsDB.find(x => x.id === L.teams[ft].teamId);
    const curP = (L.teams[ft].pitcher || "").trim().toLowerCase();
    const subChips = subTm
      ? '<div class="pchips" style="justify-content:flex-start;margin-bottom:8px">'
        + subTm.roster.slice().sort((a, b) => ((b.pos === "P") ? 1 : 0) - ((a.pos === "P") ? 1 : 0))
          .filter(p => p.name.trim().toLowerCase() !== curP)
          .map(p => '<button class="pchip" data-subpick="' + esc(p.name) + '">' + esc(p.name) + (p.pos ? " (" + esc(p.pos) + ")" : "") + "</button>").join("")
        + "</div>"
      : "";
    mid = '<div class="hint" style="text-align:center">New pitcher for ' + esc(teamLabel(ft)) + "</div>" + subChips
      + '<input id="subName" placeholder="Pitcher name" style="margin-bottom:10px">'
      + '<div class="lgrid lg2"><button class="lbtn" id="subGo">Bring him in</button><button class="lbtn soft" data-lv="main">Cancel</button></div>';
  } else if (liveView.s === "jump") {
    mid = '<div class="hint" style="text-align:center">Who\u2019s actually up for ' + esc(teamLabel(bt)) + '?</div><div class="llist">'
      + L.teams[bt].order.map((p, i) => '<button class="' + (i === L.teams[bt].idx ? "cur" : "") + '" data-jump="' + i + '">' + (i + 1) + ". " + esc(p) + "</button>").join("")
      + '</div><div class="lgrid"><button class="lbtn soft full" data-lv="main">Cancel</button></div>';
  } else {
    const strikeBtns = L.opts.strikeType
      ? '<button class="lbtn big redb" data-pitch="strike-sw">Strike<br><span style="font-size:11px">swinging</span></button><button class="lbtn big redb" data-pitch="strike-lk">Strike<br><span style="font-size:11px">looking</span></button>'
      : '<button class="lbtn big redb" data-pitch="strike">Strike</button>';
    const chips = L.opts.pitchType
      ? '<div class="pchips">' + ["FB", "CB", "SL", "CH", "OT"].map(t => '<button class="pchip' + ((L.pitchSel || "FB") === t ? " on" : "") + '" data-ptype="' + t + '">' + t + "</button>").join("") + "</div>"
      : "";
    mid = chips
      + '<div class="lgrid ' + (L.opts.strikeType ? "lg3" : "lg2") + '">'
      + '<button class="lbtn big" data-pitch="ball">Ball</button>' + strikeBtns + "</div>"
      + '<div class="lgrid lg4"><button class="lbtn soft" data-pitch="foul">Foul</button>'
      + '<button class="lbtn soft" data-out="hbp">HBP</button><button class="lbtn soft" data-out="out">Out (in play)</button>'
      + '<button class="lbtn soft" data-out="roe">Error / ROE</button></div>'
      + '<div class="lgrid lg4"><button class="lbtn" data-out="1b">1B</button><button class="lbtn" data-out="2b">2B</button>'
      + '<button class="lbtn" data-out="3b">3B</button><button class="lbtn redb" data-out="hr">HR</button></div>'
      + '<div class="lgrid lg3"><button class="lbtn soft" data-lv="bp">⟢ Base paths</button>'
      + '<button class="lbtn soft" data-lv="log">📜 Game log</button>'
      + '<button class="lbtn soft" id="lUndo"' + (L.log.length ? "" : " disabled") + '>↩ Undo</button></div>';
  }

  const ov = document.getElementById("overlay");
  ov.innerHTML = '<div class="sheet" style="max-width:480px">'
    + '<div class="sheet-head"><div><div class="disp" style="font-size:20px;font-weight:700">Live Scorer</div>'
    + '<div class="mono" style="font-size:12px;color:var(--ink-soft)">' + esc(teamLabel("away")) + " " + teamRuns("away") + " — " + teamRuns("home") + " " + esc(teamLabel("home")) + "</div></div>"
    + '<button class="xbtn" id="lClose">✕</button></div>'
    + '<div class="mono" style="text-align:center;font-size:13px;margin-bottom:6px">' + halfLabel() + ' &nbsp; <span style="letter-spacing:3px">' + "●".repeat(L.outs) + "○".repeat(3 - L.outs) + '</span> <span style="color:var(--ink-soft);font-size:11px">outs</span></div>'
    + (L.line ? lineScoreTable(L.line, teamLabel("away"), teamLabel("home"), L.inning) : "")
    + diamondSVG()
    + '<div class="lbatter"><button id="lBatter" title="Tap to change batter">#' + (L.teams[bt].idx + 1) + " " + esc(cur) + " ▾</button></div>"
    + '<div class="lnext">batting: ' + esc(teamLabel(bt)) + " · on deck: " + esc(nxt) + "</div>"
    + '<div style="text-align:center;margin-bottom:4px"><button class="addrow" id="lPitcher" style="color:var(--ink)">⚾ P: '
    + (pitcher ? esc(pitcher) + (pLine ? ' <span class="mono" style="font-size:11px;color:var(--ink-soft)">(' + esc(pLine) + ")</span>" : "") : "<i>none set — tap to add</i>") + " ▾</button></div>"
    + '<div class="lcount mono" style="font-size:40px;margin-top:0">' + L.balls + "–" + L.strikes + "</div>"
    + '<div class="lcount-label">Balls – Strikes</div>'
    + '<div class="lstat-strip mono">' + esc(liveView.flash || bLine || "") + "</div>"
    + mid
    + '<button class="donebtn disp" id="lDone">Done — stats are in the box score</button>'
    + '<div style="text-align:center;margin-top:8px"><button class="addrow" id="lReset" style="color:var(--ink-soft)">⚙ start over with new lineups</button></div>'
    + "</div>";

  const ps = ov.querySelector("#pbpScroll");
  if (ps) ps.scrollTop = ps.scrollHeight;
  ov.querySelector("#lClose").addEventListener("click", closeLive);
  ov.querySelector("#lDone").addEventListener("click", closeLive);
  ov.querySelector("#lBatter").addEventListener("click", () => { liveView = { s: "jump" }; renderLive(); });
  ov.querySelector("#lPitcher").addEventListener("click", () => { liveView = { s: "sub" }; renderLive(); });
  ov.querySelector("#lReset").addEventListener("click", () => {
    if (confirm("Start over with new lineups? Stats already in the box score will stay.")) { form.live = null; openLive(); }
  });
  const undoBtn = ov.querySelector("#lUndo");
  if (undoBtn) undoBtn.addEventListener("click", liveUndo);
  const subGo = ov.querySelector("#subGo");
  if (subGo) subGo.addEventListener("click", () => livePitchSub(ov.querySelector("#subName").value));
  ov.querySelectorAll("[data-subpick]").forEach(b => b.addEventListener("click", () => livePitchSub(b.dataset.subpick)));
  ov.querySelectorAll("[data-pitch]").forEach(b => b.addEventListener("click", () => liveCount(b.dataset.pitch)));
  ov.querySelectorAll("[data-out]").forEach(b => b.addEventListener("click", () => liveOutcome(b.dataset.out)));
  ov.querySelectorAll("[data-lv]").forEach(b => b.addEventListener("click", () => { liveView = { s: b.dataset.lv }; renderLive(); }));
  ov.querySelectorAll("[data-jump]").forEach(b => b.addEventListener("click", () => liveJump(parseInt(b.dataset.jump))));
  ov.querySelectorAll("[data-ptype]").forEach(b => b.addEventListener("click", () => { L.pitchSel = b.dataset.ptype; renderLive(); }));
  ov.querySelectorAll("[data-adv]").forEach(b => b.addEventListener("click", () => advChoose(b.dataset.adv)));
  ov.querySelectorAll("[data-base]").forEach(g => g.addEventListener("click", () => {
    if (liveView.s === "main" && L.bases[g.dataset.base]) { liveView = { s: "runner", base: g.dataset.base }; renderLive(); }
  }));
  ov.querySelectorAll("[data-pickbase]").forEach(b => b.addEventListener("click", () => { liveView = { s: "runner", base: b.dataset.pickbase }; renderLive(); }));
  ov.querySelectorAll("[data-ract]").forEach(b => b.addEventListener("click", () => runnerAct(liveView.base, b.dataset.ract)));
  ov.querySelectorAll("[data-fldstat]").forEach(b => b.addEventListener("click", () => { liveView = { s: "fld", stat: b.dataset.fldstat, team: fieldingTeam(), then: null }; renderLive(); }));
  ov.querySelectorAll("[data-fld]").forEach(b => b.addEventListener("click", () => fldApply(b.dataset.fld, liveView.team, liveView.stat, liveView.then)));
  ov.querySelectorAll("[data-fldskip]").forEach(b => b.addEventListener("click", () => {
    liveView = liveView.then ? { s: "fld", stat: liveView.then, team: liveView.team, then: null } : { s: "main" };
    renderLive();
  }));
}

function renderLiveSetup() {
  const S = liveSetup;
  if (!S.teamSel) S.teamSel = { away: null, home: null };
  if (S.solo === undefined) { S.solo = null; S.soloSide = "away"; S.soloTeamSel = null; S.soloPlayer = ""; S.soloOpp = ""; }
  const ok = S.solo === "team" ? S.names[S.soloSide].some(filled)
    : S.solo ? filled(S.soloPlayer)
    : (S.names.away.some(filled) && S.names.home.some(filled));
  const ov = document.getElementById("overlay");
  const tms = modeTeams();
  const teamById = id => tms.find(t => t.id === id);

  const lineupSection = t => {
    const saved = teamById(S.teamSel[t]);
    let body = "";
    if (saved) {
      const chosen = S.names[t].map(n => n.trim()).filter(Boolean);
      const avail = saved.roster.filter(p => !chosen.some(c => c.toLowerCase() === p.name.toLowerCase()));
      body = '<div style="font-size:11px;color:var(--ink-soft);font-style:italic;margin-bottom:4px">Tap roster names in batting order. Tap an ordered name to remove it.</div>'
        + '<div class="llist" style="gap:4px">'
        + chosen.map((n, i) => '<button class="cur" data-rm="' + t + '" data-name="' + esc(n) + '">' + (i + 1) + ". " + esc(n) + " &nbsp;\u2715</button>").join("")
        + (chosen.length ? "" : '<div style="font-size:12px;color:var(--ink-soft);padding:2px 0">No one in the order yet.</div>')
        + "</div>"
        + '<div class="pchips" style="justify-content:flex-start;margin-top:6px">'
        + avail.map(p => '<button class="pchip" data-addp="' + t + '" data-name="' + esc(p.name) + '">' + esc(p.name) + (p.pos ? " (" + esc(p.pos) + ")" : "") + "</button>").join("")
        + "</div>"
        + '<div class="lsetup-row" style="margin-top:6px"><input data-guest="' + t + '" placeholder="Add someone not on the roster"><button class="addrow" data-guestadd="' + t + '" style="white-space:nowrap">+ Add</button></div>'
        + '<div style="margin-top:8px"><label>' + esc(teamLabel(t)) + ' starting pitcher</label>'
        + '<select data-psel="' + t + '"><option value="">\u2014 pick from roster \u2014</option>'
        + saved.roster.slice().sort((a, b) => ((b.pos === "P") ? 1 : 0) - ((a.pos === "P") ? 1 : 0)).map(p => '<option value="' + esc(p.name) + '"' + (S.pitchers[t] === p.name ? " selected" : "") + ">" + esc(p.name) + (p.pos ? " (" + esc(p.pos) + ")" : "") + "</option>").join("")
        + "</select>"
        + '<input data-pitcher="' + t + '" value="' + esc(S.pitchers[t]) + '" placeholder="\u2026or type a pitcher" style="margin-top:6px"></div>';
    } else {
      body = S.names[t].map((n, i) => '<div class="lsetup-row"><span class="n mono">' + (i + 1) + ".</span>"
        + '<input data-t="' + t + '" data-i="' + i + '" value="' + esc(n) + '" placeholder="Player name">'
        + '<button class="delrow" data-delt="' + t + '" data-del="' + i + '">\ud83d\uddd1</button></div>').join("")
        + '<button class="addrow" data-add="' + t + '">+ Add a spot</button>'
        + '<div style="margin-top:8px"><label>' + esc(teamLabel(t)) + ' starting pitcher</label>'
        + '<input data-pitcher="' + t + '" value="' + esc(S.pitchers[t]) + '" placeholder="Pitcher name (optional)"></div>';
    }
    return '<div style="margin-top:14px"><label>' + esc(teamLabel(t)) + " batting order</label>"
      + '<select data-teamsel="' + t + '" style="margin-bottom:8px"><option value="">Type lineup manually</option>'
      + tms.map(tm => '<option value="' + tm.id + '"' + (S.teamSel[t] === tm.id ? " selected" : "") + ">" + esc(tm.name) + " (" + esc(tm.category) + ")</option>").join("")
      + "</select>" + body + "</div>";
  };

  const soloBody = () => {
    const saved = tms.find(t => t.id === S.soloTeamSel);
    return '<div style="margin-top:14px"><label>Whose side is your player on?</label>'
      + '<div style="display:flex;gap:6px;margin-bottom:10px">'
      + '<button class="vbtn' + (S.soloSide === "away" ? " active" : "") + '" data-sside="away">' + esc(form.away || "Away") + "</button>"
      + '<button class="vbtn' + (S.soloSide === "home" ? " active" : "") + '" data-sside="home">' + esc(form.home || "Home") + "</button></div>"
      + '<label>Pick from a saved team (optional)</label>'
      + '<select id="soloTeam" style="margin-bottom:8px"><option value="">\u2014 type the name below \u2014</option>'
      + tms.map(t => '<option value="' + t.id + '"' + (S.soloTeamSel === t.id ? " selected" : "") + ">" + esc(t.name) + " (" + esc(t.category) + ")</option>").join("") + "</select>"
      + (saved ? '<select id="soloRoster" style="margin-bottom:8px"><option value="">\u2014 pick the player \u2014</option>'
          + saved.roster.map(p => '<option value="' + esc(p.name) + '"' + (S.soloPlayer === p.name ? " selected" : "") + ">" + esc(p.name) + (p.pos ? " (" + esc(p.pos) + ")" : "") + "</option>").join("") + "</select>" : "")
      + '<label>' + (S.solo === "batter" ? "Batter" : "Pitcher") + "</label>"
      + '<input id="soloPlayer" value="' + esc(S.soloPlayer) + '" placeholder="Player name">'
      + (S.solo === "batter" ? '<div style="margin-top:8px"><label>Opposing pitcher (optional \u2014 tracks pitch counts against him)</label><input id="soloOpp" value="' + esc(S.soloOpp) + '" placeholder="Pitcher name"></div>' : "")
      + "</div>";
  };

  const optBtn = (key, lbl) =>
    '<button class="vbtn' + (S.opts[key] ? " active" : "") + '" data-opt="' + key + '">' + (S.opts[key] ? "\u2713 " : "") + lbl + "</button>";
  const modeChips = '<div style="margin-top:10px"><label>What are you scoring?</label><div style="display:flex;gap:6px;flex-wrap:wrap">'
    + [["", "Full game"], ["team", "One team"], ["batter", "One batter"], ["pitcher", "One pitcher"]].map(([v, l]) =>
      '<button class="vbtn' + ((S.solo || "") === v ? " active" : "") + '" data-solo="' + v + '">' + ((S.solo || "") === v ? "\u2713 " : "") + l + "</button>").join("") + "</div></div>";

  const pickupHtml = '<div style="margin-top:16px"><label>Picking up the game at\u2026</label>'
    + '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">'
    + '<button class="vbtn' + (S.half === "top" ? " active" : "") + '" data-half="top">\u25b2 Top (' + esc(teamLabel("away")) + ' bats)</button>'
    + '<button class="vbtn' + (S.half === "bottom" ? " active" : "") + '" data-half="bottom">\u25bc Bottom (' + esc(teamLabel("home")) + ' bats)</button>'
    + '<span style="font-size:13px">of inning</span><input id="lsInning" inputmode="numeric" value="' + S.inning + '" style="width:54px;text-align:center"></div></div>';
  const fullBody = lineupSection("away") + lineupSection("home") + pickupHtml
    + '<div class="grid2" style="margin-top:12px"><div><label>First ' + esc(teamLabel("away")) + ' batter</label><select id="lsStartA"></select></div>'
    + '<div><label>First ' + esc(teamLabel("home")) + ' batter</label><select id="lsStartH"></select></div></div>';
  const teamBody = () => '<div style="margin-top:14px"><label>Which side is your team?</label>'
    + '<div style="display:flex;gap:6px;margin-bottom:4px">'
    + '<button class="vbtn' + (S.soloSide === "away" ? " active" : "") + '" data-sside="away">' + esc(form.away || "Away") + "</button>"
    + '<button class="vbtn' + (S.soloSide === "home" ? " active" : "") + '" data-sside="home">' + esc(form.home || "Home") + "</button></div>"
    + '<div style="font-size:11px;color:var(--ink-soft);font-style:italic">When they bat you get the full scorer; when they\u2019re in the field you track your pitcher and the outs.</div>'
    + lineupSection(S.soloSide) + pickupHtml
    + '<div style="margin-top:12px"><label>First ' + esc(teamLabel(S.soloSide)) + ' batter</label><select id="' + (S.soloSide === "away" ? "lsStartA" : "lsStartH") + '"></select></div>';

  ov.innerHTML = '<div class="sheet" style="max-width:480px">'
    + '<div class="sheet-head"><div><div class="disp" style="font-size:20px;font-weight:700">Lineup Card</div>'
    + '<div class="mono" style="font-size:12px;color:var(--ink-soft)">' + esc(form.away || "Away") + " @ " + esc(form.home || "Home") + (modeOf(form) === "video" ? " \u00b7 \ud83c\udfae" : "") + "</div></div>"
    + '<button class="xbtn" id="lsClose">\u2715</button></div>'
    + (tms.length ? "" : '<div class="hint">Tip: save your teams in the \ud83d\udc65 Teams tab and lineups become tap-to-pick.</div>')
    + modeChips
    + (S.solo === "team" ? teamBody() : S.solo ? soloBody() : fullBody)
    + '<div style="margin-top:16px"><label>How much do you want to track?</label>'
    + '<div style="font-size:11px;color:var(--ink-soft);font-style:italic;margin-bottom:6px">Baseline (always on): pitch count, balls/strikes, ' + (S.solo === "team" ? "baserunners & RISP when your side bats, your pitcher\u2019s full line on defense." : S.solo ? "pitches per AB, full stat line." : "baserunners, RISP, pitches per AB, full batting & pitching lines.") + "</div>"
    + '<div style="display:flex;gap:6px;flex-wrap:wrap">' + optBtn("strikeType", "Swinging / looking") + optBtn("pitchType", "Pitch type") + (S.solo === "batter" || S.solo === "pitcher" ? "" : optBtn("fielding", "Fielding (PO\u00b7A\u00b7E)")) + "</div></div>"
    + '<button class="donebtn disp" id="lsGo"' + (ok ? "" : " disabled") + ">" + (S.solo === "team" ? "Play ball \u2014 track your side" : S.solo ? "Start tracking" : "Play ball \u2014 start scoring") + "</button></div>";

  const sels = { away: ov.querySelector("#lsStartA"), home: ov.querySelector("#lsStartH") };
  const refreshStart = t => {
    if (!sels[t]) return;
    const opts = S.names[t].map((n, i) => [n, i]).filter(([n]) => filled(n));
    sels[t].innerHTML = opts.length
      ? opts.map(([n, i]) => '<option value="' + i + '"' + (i === S.start[t] ? " selected" : "") + ">" + (i + 1) + ". " + esc(n) + "</option>").join("")
      : '<option value="0">Add players above</option>';
  };
  refreshStart("away"); refreshStart("home");

  ov.querySelector("#lsClose").addEventListener("click", closeLive);
  ov.querySelectorAll("[data-solo]").forEach(b => b.addEventListener("click", () => { S.solo = b.dataset.solo || null; renderLiveSetup(); }));
  ov.querySelectorAll("[data-sside]").forEach(b => b.addEventListener("click", () => { S.soloSide = b.dataset.sside; renderLiveSetup(); }));
  const soloTeam = ov.querySelector("#soloTeam");
  if (soloTeam) soloTeam.addEventListener("change", () => {
    S.soloTeamSel = soloTeam.value || null;
    const tm = tms.find(x => x.id === S.soloTeamSel);
    if (tm && !(S.soloSide === "away" ? form.away : form.home).trim()) {
      if (S.soloSide === "away") form.away = tm.name; else form.home = tm.name;
      const f = document.getElementById(S.soloSide === "away" ? "fAway" : "fHome");
      if (f) f.value = tm.name;
    }
    renderLiveSetup();
  });
  const soloRoster = ov.querySelector("#soloRoster");
  if (soloRoster) soloRoster.addEventListener("change", () => { S.soloPlayer = soloRoster.value; renderLiveSetup(); });
  const soloPlayer = ov.querySelector("#soloPlayer");
  if (soloPlayer) soloPlayer.addEventListener("input", () => {
    S.soloPlayer = soloPlayer.value;
    ov.querySelector("#lsGo").disabled = !filled(S.soloPlayer);
  });
  const soloOpp = ov.querySelector("#soloOpp");
  if (soloOpp) soloOpp.addEventListener("input", () => S.soloOpp = soloOpp.value);

  ov.querySelectorAll("select[data-teamsel]").forEach(sel => sel.addEventListener("change", () => {
    const t = sel.dataset.teamsel;
    S.teamSel[t] = sel.value || null;
    if (S.teamSel[t]) {
      S.names[t] = [];
      S.pitchers[t] = "";
      const tm = tms.find(x => x.id === S.teamSel[t]);
      if (tm && !(t === "away" ? form.away : form.home).trim()) {
        if (t === "away") form.away = tm.name; else form.home = tm.name;
        const f = document.getElementById(t === "away" ? "fAway" : "fHome");
        if (f) f.value = tm.name;
      }
    } else {
      S.names[t] = Array(9).fill("");
    }
    renderLiveSetup();
  }));
  ov.querySelectorAll("[data-addp]").forEach(b => b.addEventListener("click", () => {
    S.names[b.dataset.addp].push(b.dataset.name);
    renderLiveSetup();
  }));
  ov.querySelectorAll("[data-rm]").forEach(b => b.addEventListener("click", () => {
    const t = b.dataset.rm;
    S.names[t] = S.names[t].map(n => n.trim()).filter(Boolean).filter(n => n !== b.dataset.name);
    if (S.start[t] >= S.names[t].length) S.start[t] = 0;
    renderLiveSetup();
  }));
  ov.querySelectorAll("[data-guestadd]").forEach(b => b.addEventListener("click", () => {
    const t = b.dataset.guestadd;
    const inp = ov.querySelector('input[data-guest="' + t + '"]');
    if (inp && inp.value.trim()) { S.names[t].push(inp.value.trim()); renderLiveSetup(); }
  }));
  ov.querySelectorAll("select[data-psel]").forEach(sel => sel.addEventListener("change", () => {
    S.pitchers[sel.dataset.psel] = sel.value;
    renderLiveSetup();
  }));
  ov.querySelectorAll("input[data-t]").forEach(inp => inp.addEventListener("input", () => {
    S.names[inp.dataset.t][parseInt(inp.dataset.i)] = inp.value;
    refreshStart(inp.dataset.t);
    ov.querySelector("#lsGo").disabled = S.solo === "team" ? !S.names[S.soloSide].some(filled) : !(S.names.away.some(filled) && S.names.home.some(filled));
  }));
  ov.querySelectorAll("input[data-pitcher]").forEach(inp => inp.addEventListener("input", () => S.pitchers[inp.dataset.pitcher] = inp.value));
  ov.querySelectorAll("[data-del]").forEach(b => b.addEventListener("click", () => { S.names[b.dataset.delt].splice(parseInt(b.dataset.del), 1); renderLiveSetup(); }));
  ov.querySelectorAll("[data-add]").forEach(b => b.addEventListener("click", () => { S.names[b.dataset.add].push(""); renderLiveSetup(); }));
  ov.querySelectorAll("[data-half]").forEach(b => b.addEventListener("click", () => { S.half = b.dataset.half; renderLiveSetup(); }));
  ov.querySelectorAll("[data-opt]").forEach(b => b.addEventListener("click", () => { S.opts[b.dataset.opt] = !S.opts[b.dataset.opt]; renderLiveSetup(); }));
  const lsInning = ov.querySelector("#lsInning");
  if (lsInning) lsInning.addEventListener("input", ev => S.inning = Math.max(1, parseInt(ev.target.value) || 1));
  if (sels.away) sels.away.addEventListener("change", () => S.start.away = parseInt(sels.away.value) || 0);
  if (sels.home) sels.home.addEventListener("change", () => S.start.home = parseInt(sels.home.value) || 0);
  ov.querySelector("#lsGo").addEventListener("click", () => {
    if (S.solo === "team") {
      const side = S.soloSide, opp = side === "away" ? "home" : "away";
      const order = S.names[side].map(n => n.trim()).filter(Boolean);
      if (!order.length) return;
      const chosen = (S.names[side][S.start[side]] || "").trim();
      let idx = order.indexOf(chosen);
      if (idx < 0) idx = 0;
      const teams = {};
      teams[side] = { order, idx, pitcher: S.pitchers[side].trim(), teamId: S.teamSel[side] || null };
      teams[opp] = { order: ["Opposing batter"], idx: 0, pitcher: "", teamId: null };
      form.live = { oneTeam: { side }, inning: S.inning, half: S.half, outs: 0, balls: 0, strikes: 0, abPit: 0, teams, log: [],
        bases: { first: null, second: null, third: null }, opts: { ...S.opts }, pitchSel: "FB",
        line: { a: [], h: [], hits: { away: 0, home: 0 }, errs: { away: 0, home: 0 } } };
      for (const p of order) ensureRowG(p, side, "batting");
      if (teams[side].pitcher) ensureRowG(teams[side].pitcher, side, "pitching");
      if (S.opts.fielding) for (const p of order) ensureRowG(p, side, "fielding");
      renderLive();
      return;
    }
    if (S.solo) {
      const player = S.soloPlayer.trim();
      if (!player) return;
      form.live = { solo: { type: S.solo, player, team: S.soloSide, oppPitcher: S.solo === "batter" ? S.soloOpp.trim() : "" },
        balls: 0, strikes: 0, abPit: 0, risp: false, log: [],
        opts: { strikeType: S.opts.strikeType, pitchType: S.opts.pitchType, fielding: false }, pitchSel: "FB" };
      if (S.solo === "batter") {
        ensureRowG(player, S.soloSide, "batting");
        if (form.live.solo.oppPitcher) ensureRowG(form.live.solo.oppPitcher, S.soloSide === "away" ? "home" : "away", "pitching");
      } else {
        ensureRowG(player, S.soloSide, "pitching");
      }
      renderLive();
      return;
    }
    const teams = {};
    for (const t of ["away", "home"]) {
      const order = S.names[t].map(n => n.trim()).filter(Boolean);
      if (!order.length) return;
      const chosen = (S.names[t][S.start[t]] || "").trim();
      let idx = order.indexOf(chosen);
      if (idx < 0) idx = 0;
      teams[t] = { order, idx, pitcher: S.pitchers[t].trim(), teamId: S.teamSel[t] || null };
    }
    form.live = { inning: S.inning, half: S.half, outs: 0, balls: 0, strikes: 0, abPit: 0, teams, log: [],
      bases: { first: null, second: null, third: null }, opts: { ...S.opts }, pitchSel: "FB",
      line: { a: [], h: [], hits: { away: 0, home: 0 }, errs: { away: 0, home: 0 } } };
    for (const t of ["away", "home"]) {
      for (const p of teams[t].order) ensureRowG(p, t, "batting");
      if (teams[t].pitcher) ensureRowG(teams[t].pitcher, t, "pitching");
      if (S.opts.fielding) for (const p of teams[t].order) ensureRowG(p, t, "fielding");
    }
    renderLive();
  });
}

async function fetchMlbRoster(mlbId) {
  const res = await fetch("https://statsapi.mlb.com/api/v1/teams/" + mlbId + "/roster?rosterType=active");
  if (!res.ok) throw new Error("HTTP " + res.status);
  const data = await res.json();
  const roster = (data.roster || [])
    .map(r => ({ name: (r.person && r.person.fullName) || "", pos: (r.position && r.position.abbreviation) || "" }))
    .filter(p => p.name);
  if (!roster.length) throw new Error("empty roster");
  return roster;
}

let statsTab = "players";

function addAgg(acc, stats, group) {
  for (const c in stats) {
    const v = stats[c];
    if (!filled(v)) continue;
    if (group === "pitching" && c === "IP") acc.IPouts = (acc.IPouts || 0) + ipOutsOf(v);
    else acc[c] = (acc[c] || 0) + num(v);
  }
}
function aggToStats(acc, group) {
  const o = {};
  for (const c in acc) if (c !== "IPouts") o[c] = String(acc[c]);
  if (group === "pitching" && acc.IPouts) o.IP = outsToIp(acc.IPouts);
  return o;
}
function aggregate(venueF) {
  const players = {}, teams = {};
  for (const e of entries) {
    if (e.sport !== "baseball" || modeOf(e) !== appMode) continue;
    if (venueF !== "all" && e.venue !== venueF) continue;
    for (const side of ["away", "home"]) {
      const tn = (side === "away" ? e.away : e.home).trim();
      if (!tn) continue;
      const key = tn.toLowerCase();
      const T = teams[key] = teams[key] || { name: tn, gp: 0, w: 0, l: 0, d: 0, bat: {}, pit: {}, fld: {}, ip: 0 };
      T.gp++;
      if (filled(e.awayScore) && filled(e.homeScore)) {
        const my = side === "away" ? num(e.awayScore) : num(e.homeScore);
        const opp = side === "away" ? num(e.homeScore) : num(e.awayScore);
        if (my > opp) T.w++; else if (my < opp) T.l++; else T.d++;
      }
      T.ip += (e.venue === (appMode === "video" ? "played" : "in-person")) ? 1 : 0;
    }
    for (const r of (e.box || [])) {
      if (!r.player || !r.player.trim()) continue;
      const tn = ((r.team === "away" ? e.away : e.home) || "").trim();
      const gkey = { batting: "bat", pitching: "pit", fielding: "fld" }[r.group];
      if (!gkey) continue;
      if (tn && teams[tn.toLowerCase()]) addAgg(teams[tn.toLowerCase()][gkey], r.stats, r.group);
      const pkey = r.player.trim().toLowerCase();
      const P = players[pkey] = players[pkey] || { name: r.player.trim(), games: {}, teams: {}, bat: {}, pit: {}, fld: {} };
      P.games[e.id] = 1;
      if (tn) P.teams[tn] = 1;
      addAgg(P[gkey], r.stats, r.group);
    }
  }
  return { players, teams };
}

const STAT_GROUPS = { bat: ["batting", "Batting"], pit: ["pitching", "Pitching"], fld: ["fielding", "Fielding"] };
function groupDetailHtml(acc, gkey) {
  if (!Object.keys(acc).length) return "";
  const [gid, glabel] = STAT_GROUPS[gkey];
  const g = BOX.baseball.find(x => x.id === gid);
  const o = aggToStats(acc, gid);
  const totals = g.cols.filter(c => filled(o[c]))
    .map(c => '<span class="statk" data-stat="' + esc(c) + '">' + esc(c) + "</span> " + esc(o[c])).join(" · ");
  const metrics = g.calc(o);
  return '<div class="grouplabel disp" style="margin-top:10px">' + glabel + "</div>"
    + '<div class="mono" style="font-size:12px;line-height:1.7">' + totals + "</div>"
    + (metrics.length ? '<div class="mono" style="font-size:11px;color:var(--red);margin-top:3px">' + mlineHtml(metrics) + "</div>" : "");
}
