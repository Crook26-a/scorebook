function renderStatsContent() {
  const v = document.getElementById("view-stats");
  const venueF = v.querySelector("#sVenue").value;
  const q = v.querySelector("#sSearch").value.trim().toLowerCase();
  const agg = aggregate(venueF);
  const out = v.querySelector("#statsContent");
  let html = "";
  if (statsTab === "players") {
    const list = Object.values(agg.players)
      .filter(p => !q || p.name.toLowerCase().includes(q) || Object.keys(p.teams).join(" ").toLowerCase().includes(q))
      .sort((a, b) => Object.keys(b.games).length - Object.keys(a.games).length || a.name.localeCompare(b.name));
    if (!list.length) html = '<div class="empty">No player stats yet' + (venueF !== "all" ? " for that filter" : "") + ". They build automatically as you log box scores.</div>";
    for (const p of list) {
      const gp = Object.keys(p.games).length;
      const teamNames = Object.keys(p.teams).join(", ");
      let quick = "";
      if (Object.keys(p.bat).length) {
        const m = BOX.baseball[0].calc(aggToStats(p.bat, "batting"));
        const avg = m.find(x => x[0] === "AVG"), ops = m.find(x => x[0] === "OPS");
        quick = [avg && "AVG " + avg[1], ops && "OPS " + ops[1]].filter(Boolean).join(" · ");
      } else if (Object.keys(p.pit).length) {
        const m = BOX.baseball[1].calc(aggToStats(p.pit, "pitching"));
        const era = m.find(x => x[0] === "ERA");
        quick = era ? "ERA " + era[1] : "";
      }
      html += '<details class="card" style="padding:10px 14px"><summary style="cursor:pointer;list-style:none">'
        + '<span class="disp" style="font-size:15px;font-weight:700">' + esc(p.name) + "</span>"
        + '<span class="mono" style="font-size:11px;color:var(--ink-soft)"> &nbsp;' + gp + " GP" + (quick ? " · " + quick : "") + "</span>"
        + (teamNames ? '<div style="font-size:11px;color:var(--ink-soft);font-style:italic">' + esc(teamNames) + "</div>" : "")
        + "</summary>"
        + groupDetailHtml(p.bat, "bat") + groupDetailHtml(p.pit, "pit") + groupDetailHtml(p.fld, "fld")
        + "</details>";
    }
  } else {
    const list = Object.values(agg.teams)
      .filter(t => !q || t.name.toLowerCase().includes(q))
      .sort((a, b) => b.gp - a.gp || a.name.localeCompare(b.name));
    if (!list.length) html = '<div class="empty">No team stats yet' + (venueF !== "all" ? " for that filter" : "") + ".</div>";
    for (const t of list) {
      const rec = (t.w + t.l + t.d) ? t.w + "–" + t.l + (t.d ? "–" + t.d : "") + " in games you watched" : "";
      html += '<details class="card" style="padding:10px 14px"><summary style="cursor:pointer;list-style:none">'
        + '<span class="disp" style="font-size:15px;font-weight:700">' + esc(t.name) + "</span>"
        + '<span class="mono" style="font-size:11px;color:var(--ink-soft)"> &nbsp;' + t.gp + " GP" + (t.ip ? " · " + t.ip + (appMode === "video" ? " played" : " in person") : "") + "</span>"
        + (rec ? '<div style="font-size:11px;color:var(--ink-soft);font-style:italic">' + esc(rec) + "</div>" : "")
        + "</summary>"
        + groupDetailHtml(t.bat, "bat") + groupDetailHtml(t.pit, "pit") + groupDetailHtml(t.fld, "fld")
        + "</details>";
    }
  }
  out.innerHTML = html;
}

// ── Record book ───────────────────────────────────────────────────────
function gameTag(e) {
  return (e.away || "?") + " @ " + (e.home || "?") + " · " + e.date + (e.venue === "in-person" ? " 📍" : e.venue === "radio" ? " 📻" : e.venue === "played" ? " 🎮" : e.venue === "online" ? " 🌐" : "");
}
function tbOf(s) {
  const h = num(s.H), d = num(s["2B"]), t = num(s["3B"]), hr = num(s.HR);
  return (h - d - t - hr) + 2 * d + 3 * t + 4 * hr;
}

function renderRecordsView() {
  const v = document.getElementById("view-records");
  v.innerHTML = '<div class="controls" style="margin-bottom:12px">'
        + '<select id="rVenue" class="inline">' + venueFilterOptionsHtml() + "</select>"
    + '<span style="font-size:12px;color:var(--ink-soft);font-style:italic">Everything here is something you personally witnessed.</span>'
    + '</div><div id="recContent"></div>';
  v.querySelector("#rVenue").addEventListener("change", renderRecordsContent);
  renderRecordsContent();
}

function renderRecordsContent() {
  const v = document.getElementById("view-records");
  const venueF = v.querySelector("#rVenue").value;
  const games = entries.filter(e => e.sport === "baseball" && modeOf(e) === appMode && (venueF === "all" || e.venue === venueF));
  const out = v.querySelector("#recContent");

  // single-game performances
  const single = { R: [], H: [], HR: [], RBI: [], SB: [], TB: [], K: [], IPg: [] };
  for (const e of games) {
    for (const r of (e.box || [])) {
      if (!r.player || !r.player.trim()) continue;
      if (r.group === "batting") {
        for (const cat of ["R", "H", "HR", "RBI", "SB"]) {
          const val = num(r.stats[cat]);
          if (val > 0) single[cat].push({ player: r.player.trim(), val, e });
        }
        const tb = tbOf(r.stats);
        if (tb > 0) single.TB.push({ player: r.player.trim(), val: tb, e });
      } else if (r.group === "pitching") {
        const k = num(r.stats.K);
        if (k > 0) single.K.push({ player: r.player.trim(), val: k, e });
        const ipo = ipOutsOf(r.stats.IP);
        if (ipo > 0) single.IPg.push({ player: r.player.trim(), val: ipo, e, disp: outsToIp(ipo) });
      }
    }
  }
  // career totals
  const agg = aggregate(venueF);
  const careerTop = (gkey, col, label, fmt) => {
    const rows = Object.values(agg.players)
      .map(p => ({ name: p.name, gp: Object.keys(p.games).length, val: (col === "IP") ? (p[gkey].IPouts || 0) : (p[gkey][col] || 0) }))
      .filter(r => r.val > 0)
      .sort((a, b) => b.val - a.val).slice(0, 5);
    if (!rows.length) return "";
    return '<div class="grouplabel disp">' + label + "</div>"
      + rows.map((r, i) => '<div class="recrow"><span class="mono recnum">' + (i + 1) + ".</span> <b>"
        + (fmt ? fmt(r.val) : r.val) + "</b> — " + esc(r.name)
        + ' <span style="color:var(--ink-soft);font-size:11px">(' + r.gp + " GP)</span></div>").join("");
  };
  const singleTop = (cat, label, statKey) => {
    const rows = single[cat].sort((a, b) => b.val - a.val).slice(0, 5);
    if (!rows.length) return "";
    return '<div class="grouplabel disp">' + label + "</div>"
      + rows.map((r, i) => '<div class="recrow"><span class="mono recnum">' + (i + 1) + ".</span> <b>"
        + (r.disp || r.val) + '</b> <span class="statk" data-stat="' + statKey + '">' + statKey + "</span> — " + esc(r.player)
        + '<div style="font-size:11px;color:var(--ink-soft);padding-left:22px">' + esc(gameTag(r.e)) + "</div></div>").join("");
  };
  // game records from final scores
  const scored = games.filter(e => filled(e.awayScore) && filled(e.homeScore))
    .map(e => ({ e, total: num(e.awayScore) + num(e.homeScore), diff: Math.abs(num(e.awayScore) - num(e.homeScore)) }));
  const gameTop = (key, label) => {
    const rows = scored.slice().sort((a, b) => b[key] - a[key]).slice(0, 5).filter(r => r[key] > 0);
    if (!rows.length) return "";
    return '<div class="grouplabel disp">' + label + "</div>"
      + rows.map((r, i) => '<div class="recrow"><span class="mono recnum">' + (i + 1) + ".</span> <b>"
        + (key === "total" ? r.total + " runs" : "by " + r.diff) + "</b> — "
        + esc(r.e.away || "?") + " " + esc(r.e.awayScore) + ", " + esc(r.e.home || "?") + " " + esc(r.e.homeScore)
        + ' <span style="color:var(--ink-soft);font-size:11px">' + esc(r.e.date) + (r.e.venue === "in-person" ? " 📍" : r.e.venue === "played" ? " 🎮" : "") + "</span></div>").join("");
  };

  let html = "";
  const sg = singleTop("HR", "Most home runs in a game", "HR") + singleTop("RBI", "Most RBI in a game", "RBI")
    + singleTop("R", "Most runs scored in a game", "R") + singleTop("H", "Most hits in a game", "H")
    + singleTop("TB", "Most total bases in a game", "TB") + singleTop("SB", "Most steals in a game", "SB")
    + singleTop("K", "Most strikeouts by a pitcher in a game", "K") + singleTop("IPg", "Longest outing in a game", "IP");
  if (sg) html += '<div class="card"><div class="disp" style="font-size:16px;font-weight:700;border-bottom:2px solid var(--ink);padding-bottom:4px">🏆 Best single games witnessed</div>' + sg + "</div>";
  const ct = careerTop("bat", "HR", "Most home runs witnessed") + careerTop("bat", "H", "Most hits witnessed")
    + careerTop("bat", "RBI", "Most RBI witnessed") + careerTop("bat", "R", "Most runs witnessed")
    + careerTop("bat", "SB", "Most steals witnessed")
    + careerTop("pit", "K", "Most strikeouts witnessed (pitching)")
    + careerTop("pit", "IP", "Most innings pitched witnessed", v2 => outsToIp(v2));
  if (ct) html += '<div class="card"><div class="disp" style="font-size:16px;font-weight:700;border-bottom:2px solid var(--ink);padding-bottom:4px">📚 Career totals — top 5 witnessed</div>' + ct + "</div>";
  const gr = gameTop("total", "Highest-scoring games") + gameTop("diff", "Biggest blowouts");
  if (gr) html += '<div class="card"><div class="disp" style="font-size:16px;font-weight:700;border-bottom:2px solid var(--ink);padding-bottom:4px">📅 Game records</div>' + gr + "</div>";
  out.innerHTML = html || '<div class="empty">Your record book writes itself as you log games. Score one and check back.</div>';
}

// ── Shareable scorecard image ─────────────────────────────────────────
function shareScorecard(e) {
  const W = 760, pad = 26;
  const NAVY = "#1E3A5F", SOFT = "#5A7089", RED = "#C0392B", LINE = "#C2D2BC", MINT = "#EAF0E6", CARD = "#F8FBF5";
  const canvas = document.createElement("canvas");
  let ctx = canvas.getContext("2d");
  const MONO = "13px Menlo, Consolas, monospace";
  const MONO_S = "11px Menlo, Consolas, monospace";

  const wrap = (t, maxW) => {
    const words = String(t).split(" "), lines = [];
    let cur = "";
    for (const w of words) {
      const next = cur ? cur + " " + w : w;
      if (ctx.measureText(next).width > maxW && cur) { lines.push(cur); cur = w; }
      else cur = next;
    }
    if (cur) lines.push(cur);
    return lines;
  };

  const layout = (draw) => {
    let y = pad + 8;
    const t = (txt, font, color, x, align) => {
      ctx.font = font; ctx.fillStyle = color; ctx.textAlign = align || "left";
      if (draw) ctx.fillText(txt, x, y);
    };
    const hline = (style, w) => {
      if (draw) { ctx.strokeStyle = style; ctx.lineWidth = w || 1; ctx.beginPath(); ctx.moveTo(pad, y); ctx.lineTo(W - pad, y); ctx.stroke(); }
    };
    // header
    const hasScore = filled(e.awayScore) && filled(e.homeScore);
    y += 18;
    t((e.away || "Away").toUpperCase() + (hasScore ? " " + e.awayScore : "") + "  @  " + (e.home || "Home").toUpperCase() + (hasScore ? " " + e.homeScore : ""), "bold 26px 'Arial Narrow', Arial, sans-serif", NAVY, W / 2, "center");
    y += 20;
    t(e.date + (e.place ? " · " + e.place : (venueDef(e).meta || "")) + (venueDef(e).stamp ? " · " + venueDef(e).stamp.toUpperCase() : ""), "italic 13px Georgia, serif", SOFT, W / 2, "center");
    y += 10; hline(NAVY, 2); y += 3; hline(NAVY, 1); y += 16;

    // line score
    const line = e.live && e.live.line;
    if (line && (line.a.length || line.h.length)) {
      const n = Math.max(line.a.length, line.h.length);
      const colW = Math.min(34, (W - 2 * pad - 150 - 110) / n);
      const x0 = pad + 150;
      ctx.font = MONO_S;
      const tot = arr => arr.reduce((a, b) => a + (b || 0), 0);
      // header numbers
      for (let i = 0; i < n; i++) t(String(i + 1), MONO_S, SOFT, x0 + i * colW + colW / 2, "center");
      t("R", "bold " + MONO_S, NAVY, x0 + n * colW + 22, "center");
      t("H", "bold " + MONO_S, NAVY, x0 + n * colW + 52, "center");
      t("E", "bold " + MONO_S, NAVY, x0 + n * colW + 82, "center");
      y += 16;
      for (const [nm, arr, h2, er] of [[e.away || "Away", line.a, line.hits.away, line.errs.away], [e.home || "Home", line.h, line.hits.home, line.errs.home]]) {
        t(String(nm).slice(0, 18), "bold " + MONO, NAVY, pad, "left");
        for (let i = 0; i < n; i++) t(String(arr[i] != null ? arr[i] : "·"), MONO, NAVY, x0 + i * colW + colW / 2, "center");
        t(String(tot(arr)), "bold " + MONO, NAVY, x0 + n * colW + 22, "center");
        t(String(h2), MONO, NAVY, x0 + n * colW + 52, "center");
        t(String(er), MONO, NAVY, x0 + n * colW + 82, "center");
        y += 16;
      }
      y += 10;
    }

    // box scores per team
    const groups = [["batting", ["AB", "R", "H", "2B", "3B", "HR", "RBI", "BB", "SO", "SB"]], ["pitching", ["IP", "H", "R", "ER", "BB", "K", "PC"]]];
    for (const team of ["away", "home"]) {
      const rows = (e.box || []).filter(r => r.team === team && r.player.trim());
      if (!rows.length) continue;
      t((team === "away" ? e.away || "Away" : e.home || "Home"), "bold 16px 'Arial Narrow', Arial, sans-serif", NAVY, pad, "left");
      y += 4; hline(NAVY, 1.5); y += 14;
      for (const [gid, allCols] of groups) {
        const gRows = rows.filter(r => r.group === gid);
        if (!gRows.length) continue;
        const cols = allCols.filter(c => gRows.some(r => filled(r.stats[c])));
        if (!cols.length && gid === "batting") continue;
        const nameW = 190, colW = (W - 2 * pad - nameW) / Math.max(cols.length, 1);
        t(gid === "batting" ? "BATTING" : "PITCHING", "bold " + MONO_S, RED, pad, "left");
        for (let i = 0; i < cols.length; i++) t(cols[i], "bold " + MONO_S, SOFT, pad + nameW + i * colW + colW / 2, "center");
        y += 14;
        for (const r of gRows) {
          t(r.player.slice(0, 24), MONO, NAVY, pad, "left");
          for (let i = 0; i < cols.length; i++) t(r.stats[cols[i]] || "·", MONO, NAVY, pad + nameW + i * colW + colW / 2, "center");
          y += 15;
        }
        y += 8;
      }
      y += 4;
    }

    // play-by-play
    if (e.pbp && e.pbp.length) {
      t("PLAY-BY-PLAY", "bold 14px 'Arial Narrow', Arial, sans-serif", NAVY, pad, "left");
      y += 6; hline(LINE, 1); y += 14;
      let lastKey = "";
      ctx.font = "12px Georgia, serif";
      for (const p of e.pbp) {
        const key = p.h + "-" + p.i;
        if (key !== lastKey) {
          t((p.h === "top" ? "▲ TOP " : "▼ BOTTOM ") + p.i, "bold 11px 'Arial Narrow', Arial, sans-serif", RED, pad, "left");
          y += 14; lastKey = key;
        }
        ctx.font = "12px Georgia, serif";
        for (const ln of wrap(p.t, W - 2 * pad - 14)) {
          t(ln, "12px Georgia, serif", NAVY, pad + 14, "left");
          y += 14;
        }
        y += 2;
      }
      y += 6;
    }
    if (e.notes) {
      for (const ln of wrap("“" + e.notes + "”", W - 2 * pad)) {
        t(ln, "italic 12px Georgia, serif", SOFT, pad, "left");
        y += 14;
      }
    }
    y += 10;
    t("Scored with My Scorebook ⚾", "11px Georgia, serif", SOFT, W - pad, "right");
    y += 8;
    return y;
  };

  // pass 1: measure
  canvas.width = W; canvas.height = 4000;
  ctx = canvas.getContext("2d");
  const H = layout(false) + pad;
  // pass 2: draw at 2x
  canvas.width = W * 2; canvas.height = H * 2;
  ctx = canvas.getContext("2d");
  ctx.scale(2, 2);
  ctx.fillStyle = MINT; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = CARD; ctx.fillRect(10, 10, W - 20, H - 20);
  ctx.strokeStyle = NAVY; ctx.lineWidth = 2; ctx.strokeRect(10, 10, W - 20, H - 20);
  layout(true);

  canvas.toBlob(async (blob) => {
    if (!blob) return;
    const fname = "scorecard-" + (e.date || "game") + ".png";
    const file = new File([blob], fname, { type: "image/png" });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      try { await navigator.share({ files: [file], title: (e.away || "?") + " @ " + (e.home || "?") }); return; }
      catch (err) { if (err && err.name === "AbortError") return; }
    }
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = fname;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(a.href);
  }, "image/png");
}

// ── Backup & restore ──────────────────────────────────────────────────
document.getElementById("exportBtn").addEventListener("click", () => {
  const blob = new Blob([JSON.stringify({ version: 2, games: entries, teams: teamsDB }, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "scorebook-backup-" + today() + ".json";
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(a.href);
});
document.getElementById("importBtn").addEventListener("click", () => document.getElementById("importFile").click());
document.getElementById("importFile").addEventListener("change", ev => {
  const file = ev.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      const games = Array.isArray(data) ? data : (data.games || []);
      const tms = Array.isArray(data) ? [] : (data.teams || []);
      if (!Array.isArray(games)) throw new Error("bad format");
      const existing = new Set(entries.map(e => e.id));
      let added = 0;
      for (const e of games) {
        if (e && e.id && !existing.has(e.id)) { entries.push(e); existing.add(e.id); added++; }
      }
      entries.sort((a, b) => a.date < b.date ? 1 : -1);
      const tExisting = new Set(teamsDB.map(t => t.id));
      let tAdded = 0;
      for (const t of tms) {
        if (t && t.id && !tExisting.has(t.id)) { teamsDB.push(t); tExisting.add(t.id); tAdded++; }
      }
      persist(); persistTeams(); renderTally(); renderList();
      alert(added + " game" + (added === 1 ? "" : "s") + (tAdded ? " and " + tAdded + " team" + (tAdded === 1 ? "" : "s") : "") + " restored.");
    } catch (e2) {
      alert("That file doesn't look like a scorebook backup.");
    }
    ev.target.value = "";
  };
  reader.readAsText(file);
});
</script>
